<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>投資大師 Pro</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="投資大師">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2534/2534153.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>
  
  <style>
    :root { --safe-top: env(safe-area-inset-top); }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .ios-header {
      padding-top: calc(var(--safe-top) + 10px);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .stock-card {
      transition: transform 0.1s active;
    }
    .stock-card:active { transform: scale(0.97); }
    .scroll-container { height: calc(100vh - 180px); overflow-y: auto; }
    
    /* 隱藏滾動條但保持功能 */
    .scroll-container::-webkit-scrollbar { display: none; }
    
    .change-up { color: #ff3b30; } /* iOS 風格紅 */
    .change-down { color: #34c759; } /* iOS 風格綠 */
  </style>
</head>
<body class="bg-black text-white">

  <header class="ios-header sticky top-0 bg-zinc-900/80 border-b border-zinc-800 z-50 px-5 pb-4">
    <div class="flex justify-between items-end">
      <div>
        <p class="text-zinc-500 text-xs font-semibold uppercase tracking-wider">2026-04-21</p>
        <h1 class="text-3xl font-bold">投資大師</h1>
      </div>
      <div class="flex gap-3">
        <button onclick="document.getElementById('imageUpload').click()" class="bg-zinc-800 p-2.5 rounded-full">
          <span class="text-xl">📸</span>
        </button>
        <button onclick="updateAllStocks()" class="bg-emerald-600 px-4 py-2 rounded-full text-sm font-bold">更新</button>
      </div>
    </div>
    <input id="search" type="text" placeholder="搜尋代號、名稱..." class="w-full mt-4 bg-zinc-800/50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
  </header>

  <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">

  <main id="card-area" class="scroll-container p-4 space-y-3"></main>

  <footer class="fixed bottom-0 w-full bg-zinc-900/90 border-t border-zinc-800 pb-8 pt-3 px-10 flex justify-between text-xs text-zinc-500">
    <div class="flex flex-col items-center gap-1 text-emerald-500">
      <span>📊</span><span>清單</span>
    </div>
    <div class="flex flex-col items-center gap-1" onclick="alert('分析功能開發中')">
      <span>📈</span><span>分析</span>
    </div>
    <div class="flex flex-col items-center gap-1" onclick="alert('設定功能開發中')">
      <span>⚙️</span><span>設定</span>
    </div>
  </footer>

  <div id="modal" class="hidden fixed inset-0 z-[100]">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="absolute bottom-0 w-full bg-zinc-900 rounded-t-[30px] p-8 pb-12 transform transition-transform translate-y-0 shadow-2xl">
      <div class="w-12 h-1.5 bg-zinc-700 rounded-full mx-auto mb-6"></div>
      <h2 id="modal-title" class="text-2xl font-bold mb-2"></h2>
      <p id="modal-meta" class="text-zinc-500 text-sm mb-6"></p>
      <div id="modal-content" class="text-zinc-200 leading-relaxed text-lg mb-8"></div>
      <button onclick="closeModal()" class="w-full bg-zinc-800 py-4 rounded-2xl font-bold">關閉</button>
    </div>
  </div>

  <script>
    // 資料結構保持不變，但增加介面渲染邏輯
    let stocks = JSON.parse(localStorage.getItem('investmentMasterStocks')) || [
      {category:"太空衛星", ticker:"ASTS", name:"AST SpaceMobile", price:85.53, change:4.79, volume:"19.7M", news:"與 AT&T 合作推進衛星直接連手機技術，已完成關鍵地面測試。", report:"Q1財報顯示營收成長42%，現金儲備充足。", advice:"高成長太空通訊股，適合風險承受力較高的客戶長期配置。建議分批買入。", time:"2026-04-21 09:15", source:"Yahoo Finance"},
      {category:"光電通訊", ticker:"COHR", name:"Coherent", price:345.02, change:5.19, volume:"5.6M", news:"Coherent 光學元件出貨量大幅成長。", report:"本季 EPS 超出預期15%。", advice:"AI 基礎建設核心供應商。", time:"2026-04-21 11:20", source:"CNBC"}
      // ... 其餘 80 幾檔標的可在此補齊
    ];

    function renderCards(data) {
      const container = document.getElementById('card-area');
      container.innerHTML = data.map((s, idx) => `
        <div class="stock-card bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center" onclick="showDetail(${idx})">
          <div class="flex flex-col">
            <span class="text-[10px] font-bold text-emerald-500 mb-0.5">${s.category}</span>
            <span class="text-lg font-bold">${s.ticker}</span>
            <span class="text-zinc-500 text-xs">${s.name}</span>
          </div>
          <div class="text-right">
            <div class="text-lg font-mono font-medium">${s.price.toFixed(2)}</div>
            <div class="text-sm font-bold ${s.change >= 0 ? 'change-up' : 'change-down'}">
              ${s.change >= 0 ? '▲' : '▼'} ${Math.abs(s.change)}%
            </div>
          </div>
        </div>
      `).join('');
    }

    function showDetail(index) {
      const s = stocks[index];
      document.getElementById('modal-title').innerText = `${s.ticker} - ${s.name}`;
      document.getElementById('modal-meta').innerText = `分類：${s.category} | 來源：${s.source}`;
      document.getElementById('modal-content').innerHTML = `
        <div class="space-y-6">
          <section>
            <h4 class="text-emerald-500 font-bold text-sm mb-1">最新新聞</h4>
            <p>${s.news}</p>
          </section>
          <section>
            <h4 class="text-blue-400 font-bold text-sm mb-1">財報要點</h4>
            <p>${s.report}</p>
          </section>
          <section>
            <h4 class="text-amber-400 font-bold text-sm mb-1">投資建議</h4>
            <p>${s.advice}</p>
          </section>
        </div>
      `;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // 搜尋功能
    document.getElementById('search').addEventListener('input', (e) => {
      const term = e.target.value.toUpperCase();
      const filtered = stocks.filter(s => s.ticker.includes(term) || s.name.toUpperCase().includes(term));
      renderCards(filtered);
    });

    // 初始渲染
    renderCards(stocks);

    // 更新邏輯 (模擬)
    async function updateAllStocks() {
      const btn = event.target;
      btn.innerText = "更新中...";
      await new Promise(r => setTimeout(r, 1000));
      alert("資料已與最新市場同步");
      btn.innerText = "更新";
    }

    // 圖片 OCR (延用原邏輯但優化提示)
    async function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      // 顯示加載中...
      renderCards([{category:"系統", ticker:"辨識中", name:"請稍候...", price:0, change:0}]);
      
      const worker = await Tesseract.createWorker('eng');
      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();

      const tickers = text.match(/[A-Z]{2,5}/g) || [];
      alert("辨識到可能標的: " + [...new Set(tickers)].join(', '));
      renderCards(stocks);
    }
  </script>
</body>
</html>
