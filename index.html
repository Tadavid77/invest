<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>投資大師 Pro MAX v12.0</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>

  <style>
    :root { --safe-top: env(safe-area-inset-top); --header-h: 140px; }
    * { box-sizing: border-box; }
    body {
      background: #0b0f14; color: #e6edf3; font-family: system-ui, -apple-system;
      margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ---- 緊湊頂部 ---- */
    header {
      flex-shrink: 0;
      background: #18181b;
      border-bottom: 1px solid #27272a;
      padding: 8px 12px;
      z-index: 50;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 4px;
    }
    .header-top h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #34d399;
      margin: 0;
    }
    .header-buttons {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .header-buttons button {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
    }
    .api-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
    }
    .api-row input {
      flex: 1;
      background: #18181b;
      border: 1px solid #374151;
      padding: 4px 8px;
      border-radius: 6px;
      color: white;
      font-size: 11px;
    }
    .add-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .add-row input {
      background: #111827;
      border: 1px solid #374151;
      padding: 4px 8px;
      border-radius: 6px;
      color: white;
      font-size: 11px;
    }
    .add-row button {
      font-size: 10px;
      padding: 4px 10px;
    }
    .status-text {
      font-size: 10px;
      color: #9ca3af;
    }

    /* ---- 表格容器：固定高度、雙向滾動 ---- */
    .table-container {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0b0f14;
    }
    .table-scroll {
      min-width: 1250px;   /* 確保水平滾動條出現 */
      display: flex;
      flex-direction: column;
    }
    .row {
      display: flex;
      min-height: 40px;
      align-items: stretch;
    }
    .row > div {
      padding: 6px 8px;
      display: flex;
      align-items: center;
      border-right: 1px solid #1f2937;
      border-bottom: 1px solid #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
    }
    .row > div:last-child { border-right: none; }

    /* 固定標頭 */
    .header-row {
      position: sticky;
      top: 0;
      z-index: 30;
      background: #111827;
      font-weight: 700;
      color: #e5e7eb;
    }
    .header-row > div {
      background: #111827;
    }

    /* 固定代號列 (左側) */
    .col-ticker {
      position: sticky;
      left: 0;
      z-index: 20;
      background: #0b0f14;
      font-weight: 700;
      border-right: 2px solid #374151 !important;
    }
    .header-row .col-ticker {
      background: #111827;
      z-index: 40;  /* 表頭中的固定代號需更高 */
    }

    /* 欄位寬度 */
    .w-ticker { width: 85px; }
    .w-name { width: 150px; }
    .w-cat { width: 100px; }
    .w-price { width: 80px; justify-content: flex-end; }
    .w-change { width: 75px; justify-content: flex-end; }
    .w-ohlc { width: 80px; justify-content: flex-end; }
    .w-vol { width: 90px; justify-content: flex-end; }
    .w-time { width: 115px; justify-content: center; font-size: 10px; color: #9ca3af; }
    .w-news, .w-fin { width: 100px; justify-content: center; }
    .w-action { width: 130px; justify-content: center; gap: 4px; border-right: none; }

    .up { color: #ff4d4f; }
    .down { color: #22c55e; }
    .invalid { color: #f87171; }

    button { transition: all 0.15s; font-weight: 500; border-radius: 4px; cursor: pointer; }
    button:active { transform: scale(0.96); }

    /* Modal 樣式維持不變 */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
      background: #111; padding: 24px; border-radius: 16px; width: 100%;
      max-width: 600px; max-height: 80vh; overflow-y: auto; border: 1px solid #333;
    }
    .progress-bar { height: 3px; background: #1e293b; border-radius: 10px; margin: 4px 0; }
    .progress-fill { height: 3px; background: #3b82f6; border-radius: 10px; width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>

  <!-- 緊湊頭部 -->
  <header>
    <div class="header-top">
      <div>
        <h1>📈 投資大師 Pro MAX <span class="text-xs font-normal text-zinc-500">v12.0</span></h1>
        <span id="apiStatus" class="status-text">⚪ 未設定 API Key</span>
      </div>
      <div class="header-buttons">
        <button onclick="updateAll()" class="bg-blue-600 text-white">🔄 全部更新</button>
        <button onclick="openAddModal()" class="bg-indigo-600 text-white">＋新增</button>
        <button onclick="exportCSV()" class="bg-zinc-800 text-zinc-300 border border-zinc-700">📤 匯出</button>
        <button onclick="document.getElementById('csvInp').click()" class="bg-zinc-800 text-zinc-300 border border-zinc-700">📥 匯入</button>
        <button id="ocrBtn" onclick="document.getElementById('imgInp').click()" class="bg-emerald-600 text-black font-bold">📸 OCR</button>
      </div>
    </div>

    <div class="api-row">
      <input id="apiKey" type="password" placeholder="Finnhub API Key" autocomplete="off">
      <button onclick="saveKey()" class="bg-zinc-700 text-white text-xs px-3 py-1 rounded">儲存 Key</button>
    </div>

    <div class="add-row">
      <input id="newTicker" placeholder="代號" size="8" style="width:80px; font-weight:bold; color:#34d399; text-transform:uppercase;">
      <input id="newCategory" placeholder="分類" size="10" style="width:100px;">
      <button onclick="manualAdd()" class="bg-emerald-500 text-black font-bold">＋手動新增</button>
      <input id="search" placeholder="🔍 搜尋代號..." style="flex:1;">
      <div id="progressContainer" class="hidden" style="flex:1; min-width:150px;">
        <div class="flex justify-between text-xs text-zinc-400">
          <span id="progressText">更新中...</span>
          <span id="progressCount">0/0</span>
        </div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      </div>
    </div>
  </header>

  <!-- 隱藏檔案選擇 -->
  <input type="file" id="imgInp" accept="image/*" class="hidden" onchange="handleOCR(event)">
  <input type="file" id="csvInp" accept=".csv" class="hidden" onchange="importCSV(event)">

  <!-- 雙向滾動表格容器 -->
  <div class="table-container">
    <div class="table-scroll">
      <!-- 標題列 (由 JS 初始化時插入) -->
      <div id="tableHeader" class="row header-row">
        <div class="col-ticker w-ticker">代號</div>
        <div class="w-name">名稱</div>
        <div class="w-cat">分類</div>
        <div class="w-price">成交</div>
        <div class="w-change">漲跌%</div>
        <div class="w-ohlc">開盤</div>
        <div class="w-ohlc">最高</div>
        <div class="w-ohlc">最低</div>
        <div class="w-vol">成交量</div>
        <div class="w-time">更新時間</div>
        <div class="w-news">新聞</div>
        <div class="w-fin">財報</div>
        <div class="w-action">操作</div>
      </div>
      <!-- 資料列將動態插入這裡 -->
      <div id="dataRows" style="display:contents;"></div>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div id="modalText"></div>
      <button onclick="document.getElementById('modal').style.display='none'" class="w-full mt-6 bg-zinc-800 py-2.5 rounded-xl font-bold text-sm">關閉</button>
    </div>
  </div>

  <div id="chartModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content w-[90%] max-w-[1000px]" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-2">
        <h3 id="chartTitle" class="text-lg font-bold text-emerald-400">K線圖</h3>
        <button onclick="document.getElementById('chartModal').style.display='none'" class="bg-zinc-700 px-4 py-1.5 rounded-lg text-sm">關閉</button>
      </div>
      <canvas id="chartCanvas" width="900" height="400"></canvas>
    </div>
  </div>

  <script>
    (function(){
      // ---------- 全域變數 ----------
      let db;
      let stocks = [];
      let chartInstance = null;
      let apiKey = localStorage.getItem('FINNHUB_KEY') || '';
      if(apiKey) document.getElementById('apiKey').value = apiKey;

      const isNumeric = (str) => /^[\d.]+$/.test(str?.toString().trim() || '');
      const isValidPrice = (val) => typeof val === 'number' && isFinite(val) && val > 0;

      function updateApiStatusUI() {
        const el = document.getElementById('apiStatus');
        if (apiKey) {
          el.className = 'status-text text-green-400';
          el.innerText = '🟢 API Key 已設定';
        } else {
          el.className = 'status-text';
          el.innerText = '⚪ 未設定 API Key';
        }
      }
      updateApiStatusUI();

      // ---------- IndexedDB ----------
      const dbReq = indexedDB.open("stockDB_v12", 1);
      dbReq.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains('stocks')) {
          db.createObjectStore('stocks', { keyPath: 'ticker' });
        }
      };
      dbReq.onsuccess = (e) => { db = e.target.result; loadStocksFromDB(); };
      dbReq.onerror = () => console.warn('IndexedDB 不可用');

      function loadStocksFromDB() {
        if (!db) return;
        const tx = db.transaction('stocks', 'readonly');
        const req = tx.objectStore('stocks').getAll();
        req.onsuccess = () => {
          stocks = req.result || [];
          stocks.forEach(s => {
            if (!s.history) s.history = { news:[], fin:[], adv:[] };
            if (isNumeric(s.name) || s.name === 'OCR' || s.name === 'CSV') s.name = s.ticker;
            if (isNumeric(s.category)) s.category = '未分類';
            if (!s.price || isNaN(s.price)) s.price = 0;
          });
          if (stocks.length === 0) {
            stocks.push({ ticker:'AAPL', name:'Apple Inc.', category:'科技', price:0, change:0, open:0, high:0, low:0, volume:0, updated:'-', news:'', financials:'', advice:'', history:{news:[],fin:[],adv:[]} });
            saveStockToDB(stocks[0]);
          }
          render();
          if(apiKey) setTimeout(updateAll, 600);
        };
      }

      function saveStockToDB(stock) {
        if (!db) return;
        const tx = db.transaction('stocks', 'readwrite');
        tx.objectStore('stocks').put(stock);
      }
      function deleteStockFromDB(ticker) {
        if (!db) return;
        const tx = db.transaction('stocks', 'readwrite');
        tx.objectStore('stocks').delete(ticker);
      }

      // ---------- API ----------
      async function callFinnhub(endpoint, params = {}) {
        if (!apiKey) throw new Error('API_KEY_MISSING');
        const url = new URL(`https://finnhub.io/api/v1${endpoint}`);
        url.searchParams.append('token', apiKey);
        Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      }

      function validateQuote(data) {
        const c = Number(data.c), o = Number(data.o), h = Number(data.h), l = Number(data.l);
        if (!isValidPrice(c) || !isValidPrice(o) || !isValidPrice(h) || !isValidPrice(l)) return null;
        return { price: c.toFixed(2), change: (Number(data.dp)||0).toFixed(2), open: o.toFixed(2), high: h.toFixed(2), low: l.toFixed(2) };
      }

      async function fetchQuote(ticker) {
        if (!apiKey) return null;
        try { return validateQuote(await callFinnhub('/quote', { symbol: ticker })); } catch { return null; }
      }
      async function fetchVolume(ticker) {
        if (!apiKey) return null;
        try {
          const to = Math.floor(Date.now()/1000), from = to - 86400;
          const data = await callFinnhub('/stock/candle', { symbol:ticker, resolution:'D', from, to });
          if (data.s === 'ok' && data.v?.length) return data.v[data.v.length-1];
        } catch {}
        return null;
      }
      async function fetchCompanyName(ticker) {
        if (!apiKey) return null;
        try { return (await callFinnhub('/stock/profile2', { symbol: ticker })).name || null; } catch { return null; }
      }

      // ---------- 更新邏輯 ----------
      async function updateStock(stock, forceName = true) {
        const quote = await fetchQuote(stock.ticker);
        if (quote) {
          Object.assign(stock, quote);
          stock.updated = new Date().toLocaleString('zh-TW', {hour12:false});
        } else {
          if (!stock.price) { stock.price = 0; stock.change = 0; stock.open = 0; stock.high = 0; stock.low = 0; }
          stock.updated = '⚠️ 更新失敗';
        }
        const vol = await fetchVolume(stock.ticker);
        stock.volume = (vol !== null) ? vol : (stock.volume || 0);

        if (forceName || !stock.name || isNumeric(stock.name) || stock.name === stock.ticker || stock.name === 'OCR' || stock.name === 'CSV') {
          const realName = await fetchCompanyName(stock.ticker);
          if (realName) stock.name = realName;
          else if (!stock.name) stock.name = stock.ticker;
        }
        if (isNumeric(stock.category) || stock.category === 'OCR' || stock.category === 'CSV') stock.category = '未分類';
        saveStockToDB(stock);
      }

      async function updateAll() {
        if (!apiKey) { alert('請先設定 API Key'); return; }
        const progDiv = document.getElementById('progressContainer');
        progDiv.classList.remove('hidden');
        const fill = document.getElementById('progressFill');
        const countSpan = document.getElementById('progressCount');
        let completed = 0;
        const total = stocks.length;
        const tasks = stocks.map(async (s) => {
          await updateStock(s, true);
          completed++;
          fill.style.width = ((completed/total)*100) + '%';
          countSpan.innerText = `${completed}/${total}`;
          render();
        });
        await Promise.allSettled(tasks);
        setTimeout(() => progDiv.classList.add('hidden'), 2000);
      }

      window.updateOne = async (ticker) => {
        const stock = stocks.find(s => s.ticker === ticker);
        if (!stock) return;
        await updateStock(stock, true);
        render();
      };
      window.deleteStock = (ticker) => {
        if (!confirm(`確定刪除 ${ticker}？`)) return;
        stocks = stocks.filter(s => s.ticker !== ticker);
        deleteStockFromDB(ticker);
        render();
      };

      // ---------- 新聞 / 財報 ----------
      async function loadNews(stock) {
        if (!apiKey) { stock.news = '需API'; saveStockToDB(stock); render(); return; }
        try {
          const from = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
          const to = new Date().toISOString().split('T')[0];
          const data = await callFinnhub('/company-news', { symbol: stock.ticker, from, to });
          stock.news = data?.length ? data.slice(0,3).map(n => n.headline).join(' || ') : '無近期新聞';
        } catch { stock.news = '載入失敗'; }
        saveStockToDB(stock);
        render();
      }
      async function loadFinancials(stock) {
        if (!apiKey) { stock.financials = '需API'; saveStockToDB(stock); render(); return; }
        try {
          const metric = await callFinnhub('/stock/metric', { symbol: stock.ticker });
          const pe = metric.metric?.peBasicExclExtraTTM || metric.metric?.peTTM || 'N/A';
          stock.financials = `P/E: ${pe}`;
        } catch { stock.financials = '載入失敗'; }
        saveStockToDB(stock);
        render();
      }

      window.handleNewsClick = (ticker) => { const s = stocks.find(x => x.ticker===ticker); if(s) loadNews(s); };
      window.handleFinancialClick = (ticker) => { const s = stocks.find(x => x.ticker===ticker); if(s) loadFinancials(s); };
      window.showDetail = (ticker, type) => {
        const s = stocks.find(x => x.ticker===ticker);
        if(!s) return;
        document.getElementById('modalText').innerHTML = `<p class="text-sm whitespace-pre-wrap">${type==='news' ? s.news : s.financials}</p>`;
        document.getElementById('modal').style.display='flex';
      };
      window.showFailTime = (ticker) => {
        const s = stocks.find(x => x.ticker===ticker);
        if(s) alert(s.updated);
      };

      // ---------- K線圖 ----------
      window.showChart = async (ticker) => {
        if (!apiKey) { alert('請先設定 API Key'); return; }
        document.getElementById('chartTitle').innerText = `${ticker} 近30日K線`;
        document.getElementById('chartModal').style.display='flex';
        try {
          const to = Math.floor(Date.now()/1000), from = to - 30*86400;
          const data = await callFinnhub('/stock/candle', { symbol:ticker, resolution:'D', from, to });
          if (data.s !== 'ok') throw new Error('無資料');
          const ohlc = data.t.map((t,i) => ({ x:t*1000, o:data.o[i], h:data.h[i], l:data.l[i], c:data.c[i] }));
          const ctx = document.getElementById('chartCanvas').getContext('2d');
          if (chartInstance) chartInstance.destroy();
          chartInstance = new Chart(ctx, {
            type: 'candlestick',
            data: { datasets: [{ label:ticker, data:ohlc, color:{ up:'#ff4d4f', down:'#22c55e', unchanged:'#999' } }] },
            options: { responsive:true, maintainAspectRatio:true }
          });
        } catch (e) { alert('圖表載入失敗'); }
      };

      // ---------- 新增 ----------
      window.openAddModal = () => {
        document.getElementById('newTicker').value = '';
        document.getElementById('newCategory').value = '';
        document.getElementById('newTicker').focus();
      };
      window.manualAdd = async () => {
        const ticker = document.getElementById('newTicker').value.trim().toUpperCase();
        if (!ticker) return;
        const cat = document.getElementById('newCategory').value.trim() || '未分類';
        if (stocks.find(s => s.ticker===ticker)) { alert('代號已存在'); return; }
        const ns = { ticker, name:ticker, category:cat, price:0, change:0, open:0, high:0, low:0, volume:0, updated:'-', news:'', financials:'', history:{news:[],fin:[],adv:[]} };
        stocks.push(ns);
        saveStockToDB(ns);
        render();
        document.getElementById('newTicker').value = '';
        document.getElementById('newCategory').value = '';
        await updateStock(ns, true);
        render();
      };

      // ---------- 渲染 ----------
      function render(filtered = stocks) {
        const sorted = [...filtered].sort((a,b) => (a.category||'未分類').localeCompare((b.category||'未分類'), 'zh-Hant') || a.ticker.localeCompare(b.ticker));
        const container = document.getElementById('dataRows');
        container.innerHTML = '';
        sorted.forEach(s => {
          const changeVal = parseFloat(s.change||0);
          const cls = changeVal > 0 ? 'up' : (changeVal < 0 ? 'down' : '');
          let nameDisplay = (s.name || s.ticker).substring(0,16) + ((s.name||'').length>16 ? '…' : '');
          let timeHtml = (s.updated||'-').startsWith('⚠️') ? `<button onclick="showFailTime('${s.ticker}')" class="bg-yellow-700 text-white text-[10px] px-1.5 py-0.5 rounded">⚠️</button>` : `<span class="text-[10px] text-zinc-400">${s.updated}</span>`;
          let newsHtml = !s.news ? `<button onclick="handleNewsClick('${s.ticker}')" class="bg-blue-700 text-white text-[10px] px-1.5 py-0.5 rounded">載入</button>` : (s.news==='無近期新聞'||s.news==='需API'||s.news==='載入失敗') ? `<span class="text-[11px] text-zinc-500">${s.news}</span>` : `<button onclick="showDetail('${s.ticker}','news')" class="bg-yellow-700 text-white text-[10px] px-1.5 py-0.5 rounded">⚠️</button>`;
          let finHtml = !s.financials ? `<button onclick="handleFinancialClick('${s.ticker}')" class="bg-blue-700 text-white text-[10px] px-1.5 py-0.5 rounded">載入</button>` : (s.financials==='需API'||s.financials==='載入失敗') ? `<span class="text-[11px] text-zinc-500">${s.financials}</span>` : `<button onclick="showDetail('${s.ticker}','financials')" class="bg-yellow-700 text-white text-[10px] px-1.5 py-0.5 rounded">⚠️</button>`;
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `
            <div class="col-ticker w-ticker text-emerald-400">${s.ticker}</div>
            <div class="w-name ${!s.name||s.name===s.ticker?'invalid':''}">${nameDisplay}</div>
            <div class="w-cat ${(s.category||'未分類')==='未分類'?'invalid':''}">${s.category||'未分類'}</div>
            <div class="w-price ${cls} font-bold">${parseFloat(s.price||0).toFixed(2)}</div>
            <div class="w-change ${cls} font-bold">${changeVal>0?'+':''}${Math.abs(changeVal).toFixed(2)}%</div>
            <div class="w-ohlc">${parseFloat(s.open||0).toFixed(2)}</div>
            <div class="w-ohlc">${parseFloat(s.high||0).toFixed(2)}</div>
            <div class="w-ohlc">${parseFloat(s.low||0).toFixed(2)}</div>
            <div class="w-vol">${s.volume||'-'}</div>
            <div class="w-time">${timeHtml}</div>
            <div class="w-news">${newsHtml}</div>
            <div class="w-fin">${finHtml}</div>
            <div class="w-action" style="display:flex;">
              <button onclick="updateOne('${s.ticker}')" class="bg-emerald-600 text-black text-[10px] px-1.5 py-0.5 rounded font-bold">更</button>
              <button onclick="showChart('${s.ticker}')" class="bg-zinc-700 text-white text-[10px] px-1.5 py-0.5 rounded">圖</button>
              <button onclick="deleteStock('${s.ticker}')" class="bg-red-700 text-white text-[10px] px-1.5 py-0.5 rounded">刪</button>
            </div>`;
          container.appendChild(row);
        });
      }

      document.getElementById('search').addEventListener('input', (e) => {
        const q = e.target.value.toUpperCase();
        render(stocks.filter(s => s.ticker.includes(q) || (s.name||'').toUpperCase().includes(q)));
      });

      window.saveKey = () => {
        apiKey = document.getElementById('apiKey').value.trim();
        localStorage.setItem('FINNHUB_KEY', apiKey);
        updateApiStatusUI();
        alert('API Key 已儲存');
      };

      window.exportCSV = () => {
        let csv = '\uFEFF代號,名稱,分類,成交,漲跌%,開盤,最高,最低,成交量,更新時間\n';
        stocks.forEach(s => csv += `${s.ticker},${s.name},${s.category},${s.price},${s.change},${s.open},${s.high},${s.low},${s.volume},"${s.updated}"\n`);
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'stocks.csv'; a.click();
      };

      window.importCSV = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const rows = evt.target.result.split('\n').slice(1);
          rows.forEach(r => {
            if(!r.trim()) return;
            const cols = r.split(',');
            const ticker = cols[0]?.trim().toUpperCase(); if(!ticker) return;
            let stock = stocks.find(s => s.ticker===ticker);
            if(!stock) {
              stock = { ticker, name:cols[1]||ticker, category:cols[2]||'未分類', price:parseFloat(cols[3])||0, change:parseFloat(cols[4])||0, open:parseFloat(cols[5])||0, high:parseFloat(cols[6])||0, low:parseFloat(cols[7])||0, volume:cols[8]||0, updated:cols[9]||'-', news:'', financials:'', history:{news:[],fin:[],adv:[]} };
              stocks.push(stock);
            } else {
              if(cols[1]) stock.name = cols[1];
              if(cols[2]) stock.category = cols[2];
              stock.price = parseFloat(cols[3]) || stock.price;
              stock.change = parseFloat(cols[4]) || stock.change;
              stock.open = parseFloat(cols[5]) || stock.open;
              stock.high = parseFloat(cols[6]) || stock.high;
              stock.low = parseFloat(cols[7]) || stock.low;
              stock.volume = cols[8] || stock.volume;
              if(cols[9]) stock.updated = cols[9];
            }
            saveStockToDB(stock);
          });
          render();
          alert('匯入完成');
        };
        reader.readAsText(file, 'utf-8');
      };

      window.handleOCR = async (event) => {
        const file = event.target.files[0]; if(!file) return;
        const btn = document.getElementById('ocrBtn');
        btn.innerText = '辨識中...'; btn.disabled = true;
        try {
          const worker = await Tesseract.createWorker('eng');
          const { data: { text } } = await worker.recognize(file);
          await worker.terminate();
          text.split('\n').forEach(line => {
            const m = line.match(/([A-Z]{2,6})\s+([\d,.]+)/);
            if(m){
              const ticker = m[1], price = parseFloat(m[2].replace(/,/g,''));
              let exist = stocks.find(s => s.ticker===ticker);
              if(exist) { exist.price = price; saveStockToDB(exist); }
              else {
                const ns = { ticker, name:ticker, category:'OCR', price, change:0, open:0, high:0, low:0, volume:0, updated:new Date().toLocaleString('zh-TW',{hour12:false}), news:'', financials:'', history:{news:[],fin:[],adv:[]} };
                stocks.push(ns); saveStockToDB(ns);
              }
            }
          });
          render();
        } catch(ex) { alert('OCR 失敗'); }
        btn.innerText = '📸 OCR'; btn.disabled = false;
      };

      window.updateAll = updateAll;
      // 確保 db 載入
      if (!db) dbReq.onsuccess = (e) => { db = e.target.result; loadStocksFromDB(); };
    })();
  </script>
</body>
</html>
