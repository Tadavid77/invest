<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資大師 Pro MAX</title>

<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:-apple-system;}
header {
    position:sticky; top:0;
    background:#111; z-index:20;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

.toolbar { display:flex; gap:6px; overflow:auto; padding:8px; }
button { min-height:40px; }

.container { overflow-x:auto; }

.row {
    display:flex;
    border-bottom:1px solid #222;
}

.cell {
    padding:6px;
    min-width:70px;
    font-size:12px;
}

.cell:first-child {
    position:sticky;
    left:0;
    background:#111;
    z-index:10;
}

/* 窄欄位 */
.ticker {min-width:60px;}
.name {min-width:80px;}
.cat {min-width:70px;}
.price {min-width:70px;}
.change {min-width:70px;}
.time {min-width:90px;}

.long {
    min-width:280px;
    max-width:380px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    cursor:pointer;
}
.long::after { content:" 📎"; font-size:10px; }

.up { color:#ff4d4f; }
.down { color:#00c853; }

/* 投資欄位 */
.port { min-width:90px; }

/* 總資產 */
.summary {
    padding:10px;
    background:#111;
    font-size:14px;
}

</style>
</head>

<body>

<header>投資大師 Pro MAX</header>

<div class="toolbar">
<button onclick="updateAll()">🔄 全部更新</button>
<button onclick="exportCSV()">📤 匯出</button>
<input type="file" onchange="importCSV(event)">
<button onclick="runOCR()">📷 OCR</button>
<input id="search" placeholder="搜尋..." oninput="render()">
</div>

<div class="summary" id="summary"></div>

<div class="container">
<div id="list"></div>
</div>

<script>

let stocks = JSON.parse(localStorage.getItem("stocks") || "[]");

/* =========================
初始化資料
========================= */
if(stocks.length===0){
stocks = [
{ticker:"AAPL",name:"Apple",category:"科技",qty:10,cost:150,price:0,change:0,news:"",fin:"",adv:"",history:[],updatedAt:""},
{ticker:"TSLA",name:"Tesla",category:"電動車",qty:5,cost:200,price:0,change:0,news:"",fin:"",adv:"",history:[],updatedAt:""}
];
save();
}

/* =========================
API 抓價格
========================= */
async function fetchPrice(ticker){
try{
let url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}`;
let res=await fetch(url);
let data=await res.json();

let q=data.quoteResponse.result[0];
return {
price:q.regularMarketPrice,
change:q.regularMarketChangePercent
};
}catch(e){
return null;
}
}

/* =========================
更新單一
========================= */
async function updateOne(s){

let data=await fetchPrice(s.ticker);

if(data){
s.price=data.price;
s.change=data.change;
s.updatedAt=new Date().toLocaleString();
}

save();
render();
}

/* =========================
更新全部
========================= */
async function updateAll(){
for(let s of stocks){
await updateOne(s);
}
}

/* =========================
投資計算
========================= */
function calcSummary(){

let total=0;
let cost=0;

stocks.forEach(s=>{
if(s.price){
total+=s.price*s.qty;
cost+=s.cost*s.qty;
}
});

let profit=total-cost;
let roi=cost? (profit/cost*100):0;

document.getElementById("summary").innerHTML=
`總資產：${total.toFixed(0)} ｜ 損益：${profit.toFixed(0)} ｜ 報酬率：${roi.toFixed(2)}%`;
}

/* =========================
Render
========================= */
function render(){

let kw=document.getElementById("search").value.toLowerCase();

let filtered=stocks.filter(s=>
s.ticker.toLowerCase().includes(kw) ||
s.name.toLowerCase().includes(kw)
);

if(filtered.length===0){
document.getElementById("list").innerHTML="查無資料";
return;
}

let html="";

filtered.forEach(s=>{

let value=s.price*s.qty || 0;
let profit=(s.price-s.cost)*s.qty || 0;
let roi=s.cost? ((s.price-s.cost)/s.cost*100):0;

html+=`
<div class="row">

<div class="cell ticker">${s.ticker}</div>
<div class="cell name">${s.name}</div>
<div class="cell cat">${s.category}</div>

<div class="cell price">${s.price?.toFixed(2)||"-"}</div>
<div class="cell change ${s.change>=0?"up":"down"}">${s.change?.toFixed(2)||0}%</div>

<div class="cell port">股數:${s.qty}</div>
<div class="cell port">成本:${s.cost}</div>

<div class="cell port">市值:${value.toFixed(0)}</div>
<div class="cell port ${profit>=0?"up":"down"}">損益:${profit.toFixed(0)}</div>
<div class="cell port ${roi>=0?"up":"down"}">${roi.toFixed(1)}%</div>

<div class="cell time">${s.updatedAt||""}</div>

<div class="cell long" onclick="alert(s.news||'無')">新聞</div>
<div class="cell long" onclick="alert(s.fin||'無')">財報</div>
<div class="cell long" onclick="alert(s.adv||'無')">建議</div>

<button onclick="updateOne(stocks.find(x=>x.ticker==='${s.ticker}'))">更新</button>

</div>
`;
});

document.getElementById("list").innerHTML=html;

calcSummary();
}

/* =========================
CSV 匯出
========================= */
function exportCSV(){
let csv="代號,名稱,股數,成本\n";
stocks.forEach(s=>{
csv+=`${s.ticker},${s.name},${s.qty},${s.cost}\n`;
});
let blob=new Blob(["\uFEFF"+csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="投資.csv";
a.click();
}

/* =========================
CSV 匯入
========================= */
function importCSV(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(){
let rows=reader.result.split("\n").slice(1);
rows.forEach(r=>{
let c=r.split(",");
if(c.length>=4){
stocks.push({
ticker:c[0],name:c[1],
qty:+c[2],cost:+c[3],
price:0,change:0,history:[]
});
}
});
save();
render();
}
reader.readAsText(file);
}

/* =========================
OCR（簡化版）
========================= */
function runOCR(){
alert("OCR 可接 Tesseract.js（已預留）");
}

/* ========================= */
function save(){
localStorage.setItem("stocks",JSON.stringify(stocks));
}

render();

</script>
</body>
</html>
