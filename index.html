<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資大師 Pro MAX · 真實報價版</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.0/dist/chartjs-chart-financial.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>

  <style>
    body { background: #0b0f14; color: #e6edf3; font-size: 12px; }
    .table-wrap { overflow-x: auto; }
    .row { display: flex; min-width: 1580px; border-bottom: 1px solid #1f2937; }
    .cell { 
      padding: 4px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-right: 1px solid #1f2937;   /* 直向格線 */
    }
    .cell:last-child { border-right: none; }
    .header-row .cell { border-right: 1px solid #374151; }
    .header-row .cell:last-child { border-right: none; }
    .ticker { min-width: 70px; font-weight: bold; }
    .name { min-width: 140px; }
    .cat { min-width: 90px; }
    .price { min-width: 75px; }
    .change { min-width: 70px; }
    .open, .high, .low, .volume { min-width: 75px; }
    .time { min-width: 140px; font-size: 10.5px; color: #9ca3af; }
    .ops { min-width: 130px; display: flex; gap: 4px; align-items: center; }
    .sticky { position: sticky; left: 0; background: #020617; z-index: 10; border-right: 1px solid #374151; }
    .up { color: #22c55e; }
    .down { color: #ef4444; }
    .bg-up { background: rgba(34,197,94,0.06); }
    .bg-down { background: rgba(239,68,68,0.06); }
    .header-row { background: #020617; font-weight: bold; border-bottom: 2px solid #374151; }
    .long { min-width: 180px; max-width: 220px; cursor: pointer; text-decoration: underline dotted rgba(255,255,255,0.2); }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: #111; padding: 20px; max-width: 95%; max-height: 90%; overflow: auto; border-radius: 12px; border: 1px solid #2d3748; }
    .progress-bar { height: 6px; background: #1e293b; border-radius: 10px; margin: 8px 0; }
    .progress-fill { height: 6px; background: #3b82f6; border-radius: 10px; width: 0%; transition: width 0.2s; }
    button { transition: all 0.15s; font-weight: 500; border-radius: 6px; }
    button:active { transform: scale(0.96); }
    .fail-label { color: #f87171; font-size: 10px; }
  </style>
</head>

<body class="p-2">

<header class="mb-3">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-black text-emerald-400">📈 投資大師 Pro MAX</h1>
    <div class="flex items-center gap-3 text-sm">
      <span id="apiStatus" class="px-2 py-1 bg-gray-800 rounded-full text-gray-400">⚪ 未設定 API</span>
      <button onclick="toggleApiSettings()" class="bg-gray-700 px-3 py-1 rounded text-white text-xs">🔑 設定</button>
    </div>
  </div>

  <div id="apiPanel" class="hidden mt-2 p-3 bg-gray-900 rounded-lg border border-gray-700">
    <label class="block text-xs text-gray-400 mb-1">Finnhub API Key (免費註冊: finnhub.io)</label>
    <div class="flex gap-2">
      <input type="text" id="apiKeyInput" class="flex-1 bg-black border border-gray-600 p-2 rounded text-sm" placeholder="貼上你的 API Key" autocomplete="off">
      <button onclick="saveApiKey()" class="bg-blue-600 px-4 py-2 rounded text-sm">儲存並測試</button>
    </div>
    <p class="text-gray-500 text-xs mt-2">免費版每分鐘60次請求，建議自選股不超過10檔。</p>
  </div>

  <div class="flex flex-wrap gap-2 mt-3 items-center">
    <button onclick="updateAll()" class="bg-yellow-500 hover:bg-yellow-600 text-black px-3 py-1.5 rounded text-sm font-semibold">🔄 更新全部</button>
    <button onclick="openAddStockModal()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1.5 rounded text-sm">➕ 新增股票</button>
    <button onclick="document.getElementById('upload').click()" id="ocrBtn" class="bg-blue-500 hover:bg-blue-600 px-3 py-1.5 rounded text-sm">📷 OCR 匯入</button>
    <button onclick="exportCSV()" class="bg-green-500 hover:bg-green-600 px-3 py-1.5 rounded text-sm">📤 匯出 CSV</button>
    <button onclick="document.getElementById('importCSV').click()" class="bg-purple-500 hover:bg-purple-600 px-3 py-1.5 rounded text-sm">📥 匯入 CSV</button>
    <input type="file" id="upload" class="hidden" accept="image/*" onchange="handleOCRUpload(event)">
    <input type="file" id="importCSV" class="hidden" accept=".csv" onchange="importCsvFile(event)">
    <div class="flex-1"></div>
    <input id="search" class="w-64 p-2 bg-gray-900 border border-gray-700 rounded text-sm" placeholder="🔍 搜尋代號...">
  </div>

  <div id="progressContainer" class="hidden mt-3">
    <div class="flex justify-between text-xs text-gray-400">
      <span id="progressText">更新中...</span>
      <span id="progressCount">0/0</span>
    </div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>
</header>

<div class="table-wrap border border-gray-800 rounded-lg">
  <div class="row header-row text-gray-300">
    <div class="cell ticker sticky">代號</div>
    <div class="cell name">名稱</div>
    <div class="cell cat">分類</div>
    <div class="cell price">成交</div>
    <div class="cell change">漲跌%</div>
    <div class="cell open">開盤</div>
    <div class="cell high">最高</div>
    <div class="cell low">最低</div>
    <div class="cell volume">成交量</div>
    <div class="cell time">更新時間</div>
    <div class="cell long">📰 新聞</div>
    <div class="cell long">📊 財報</div>
    <div class="cell ops">⚡操作</div>
  </div>
  <div id="list"></div>
</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content" id="modalText" onclick="event.stopPropagation()"></div>
</div>

<div id="chartModal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content w-[1000px]" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-2">
      <h3 class="text-lg font-bold" id="chartTitle">歷史走勢</h3>
      <button onclick="document.getElementById('chartModal').style.display='none'" class="bg-gray-700 px-4 py-1 rounded">關閉</button>
    </div>
    <canvas id="chartCanvas" width="900" height="400"></canvas>
  </div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content w-96" onclick="event.stopPropagation()">
    <h2 class="text-xl mb-4">➕ 新增觀察股</h2>
    <input id="newTicker" class="w-full p-2 mb-2 bg-gray-800 border border-gray-600 rounded" placeholder="代號 (如 AAPL)">
    <input id="newName" class="w-full p-2 mb-2 bg-gray-800 border border-gray-600 rounded" placeholder="公司名稱 (選填)">
    <input id="newCategory" class="w-full p-2 mb-4 bg-gray-800 border border-gray-600 rounded" placeholder="分類 (如 科技)">
    <div class="flex gap-2 justify-end">
      <button onclick="document.getElementById('addModal').style.display='none'" class="bg-gray-600 px-4 py-2 rounded">取消</button>
      <button onclick="addManualStock()" class="bg-emerald-600 px-4 py-2 rounded">新增並報價</button>
    </div>
  </div>
</div>

<script>
  (function(){
    let db;
    let stocks = [];
    let chartInstance = null;
    let apiKey = localStorage.getItem('finnhub_api_key') || '';

    // 行業中英對照表
    const industryMap = {
      'Technology': '科技',
      'Healthcare': '醫療保健',
      'Financial Services': '金融服務',
      'Consumer Cyclical': '消費週期',
      'Communication Services': '通訊服務',
      'Industrials': '工業',
      'Energy': '能源',
      'Real Estate': '房地產',
      'Basic Materials': '原物料',
      'Consumer Defensive': '消費防禦',
      'Utilities': '公用事業',
      'ETFs': 'ETF',
      'Mutual Fund': '共同基金',
      'Index': '指數',
    };
    function translateIndustry(industry) {
      return industryMap[industry] || industry || '其他';
    }

    // 判斷是否需要更新名稱（預設值或明顯錯誤）
    function needsNameUpdate(stock) {
      const name = stock.name || '';
      return name === '' || name === '-' || name === stock.ticker || name === 'OCR' || name === 'CSV' || name === 'OCR';
    }

    function updateApiStatusUI() {
      const el = document.getElementById('apiStatus');
      if (apiKey) {
        el.className = 'px-2 py-1 bg-green-900 text-green-300 rounded-full text-xs';
        el.innerText = '🟢 API 已設定';
      } else {
        el.className = 'px-2 py-1 bg-gray-800 text-gray-400 rounded-full text-xs';
        el.innerText = '⚪ 未設定 API';
      }
    }
    updateApiStatusUI();
    if(apiKey) document.getElementById('apiKeyInput').value = apiKey;

    const dbReq = indexedDB.open("stockDB_v3", 3);
    dbReq.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains('stocks')) {
        db.createObjectStore('stocks', { keyPath: 'ticker' });
      }
    };
    dbReq.onsuccess = (e) => { db = e.target.result; loadStocksFromDB(); };
    dbReq.onerror = () => console.warn('IndexedDB 不可用');

    function loadStocksFromDB() {
      if (!db) return;
      const tx = db.transaction('stocks', 'readonly');
      const req = tx.objectStore('stocks').getAll();
      req.onsuccess = () => {
        stocks = req.result || [];
        if (stocks.length === 0) {
          stocks.push({ ticker:'AAPL', name:'Apple Inc.', category:'科技', price:'-', change:0, open:'-', high:'-', low:'-', volume:'-', updated:'-', news:'點擊載入', financials:'點擊載入' });
        }
        render();
      };
    }

    function saveStockToDB(stock) {
      if (!db) return;
      const tx = db.transaction('stocks', 'readwrite');
      tx.objectStore('stocks').put(stock);
    }

    function deleteStockFromDB(ticker) {
      if (!db) return;
      const tx = db.transaction('stocks', 'readwrite');
      tx.objectStore('stocks').delete(ticker);
    }

    // ---------- API 核心 ----------
    async function callFinnhub(endpoint, params = {}) {
      if (!apiKey) throw new Error('API_KEY_MISSING');
      const url = new URL(`https://finnhub.io/api/v1${endpoint}`);
      url.searchParams.append('token', apiKey);
      Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function fetchFullQuote(ticker) {
      if (!apiKey) return null;
      try {
        const data = await callFinnhub('/quote', { symbol: ticker });
        return {
          price: data.c?.toFixed(2) || null,
          change: data.dp?.toFixed(2) || null,
          open: data.o?.toFixed(2) || null,
          high: data.h?.toFixed(2) || null,
          low: data.l?.toFixed(2) || null,
          pc: data.pc,
        };
      } catch (e) {
        console.warn(`${ticker} 報價失敗`, e);
        return null;
      }
    }

    async function fetchVolume(ticker) {
      if (!apiKey) return null;
      try {
        const to = Math.floor(Date.now()/1000);
        const from = to - 86400;
        const data = await callFinnhub('/stock/candle', { symbol:ticker, resolution:'D', from, to });
        if (data.s === 'ok' && data.v?.length) return data.v[data.v.length-1];
      } catch {}
      return null;
    }

    // 獲取公司名稱與行業
    async function fetchCompanyProfile(ticker) {
      if (!apiKey) return null;
      try {
        const profile = await callFinnhub('/stock/profile2', { symbol: ticker });
        return {
          name: profile.name || ticker,
          industry: profile.finnhubIndustry || ''
        };
      } catch {
        return null;
      }
    }

    // 更新單一股票
    async function updateStockData(stock) {
      const quote = await fetchFullQuote(stock.ticker);
      if (quote && quote.price != null) {
        stock.price = quote.price;
        stock.change = quote.change ?? 0;
        stock.open = quote.open ?? '-';
        stock.high = quote.high ?? '-';
        stock.low = quote.low ?? '-';
        stock.pc = quote.pc;
      } else {
        stock.updated = `⚠️ 更新失敗 (${new Date().toLocaleTimeString()})`;
        saveStockToDB(stock);
        return;
      }

      const vol = await fetchVolume(stock.ticker);
      if (vol !== null) stock.volume = vol;
      else if (!stock.volume || stock.volume === '-') stock.volume = '-';

      // 自動修正名稱與分類
      if (needsNameUpdate(stock)) {
        const profile = await fetchCompanyProfile(stock.ticker);
        if (profile) {
          stock.name = profile.name;
          stock.category = translateIndustry(profile.industry) || stock.category;
        }
      }

      stock.updated = new Date().toLocaleString();
      saveStockToDB(stock);
    }

    // 全部更新（平行）
    async function updateAll() {
      if (stocks.length === 0) return;
      const progDiv = document.getElementById('progressContainer');
      const fill = document.getElementById('progressFill');
      const progText = document.getElementById('progressText');
      const countSpan = document.getElementById('progressCount');
      progDiv.classList.remove('hidden');

      let completed = 0;
      const total = stocks.length;
      const tasks = stocks.map(async (stock) => {
        await updateStockData(stock);
        completed++;
        fill.style.width = ((completed/total)*100) + '%';
        countSpan.innerText = `${completed}/${total}`;
        render();
      });

      progText.innerText = '⏳ 平行更新中...';
      await Promise.allSettled(tasks);
      progText.innerText = '✅ 更新完畢';
      setTimeout(() => progDiv.classList.add('hidden'), 2500);
    }

    window.updateOne = async (ticker) => {
      const stock = stocks.find(s => s.ticker === ticker);
      if (!stock) return;
      await updateStockData(stock);
      render();
    };

    // ---------- 刪除功能 ----------
    window.deleteStock = (ticker) => {
      if (!confirm(`確定要刪除 ${ticker} 嗎？`)) return;
      stocks = stocks.filter(s => s.ticker !== ticker);
      deleteStockFromDB(ticker);
      render();
    };

    // ---------- 新聞 & 財報 ----------
    async function loadNewsForStock(stock) {
      if (!apiKey) { stock.news = '需API Key'; render(); return; }
      try {
        const from = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
        const to = new Date().toISOString().split('T')[0];
        const news = await callFinnhub('/company-news', { symbol: stock.ticker, from, to });
        stock.news = news?.length ? news.slice(0,3).map(n => n.headline).join(' | ') : '無近期新聞';
      } catch { stock.news = '載入失敗'; }
      saveStockToDB(stock);
      render();
    }

    async function loadFinancials(stock) {
      if (!apiKey) { stock.financials = '需API Key'; render(); return; }
      try {
        const metric = await callFinnhub('/stock/metric', { symbol: stock.ticker });
        const pe = metric.metric?.peBasicExclExtraTTM || metric.metric?.peTTM || 'N/A';
        stock.financials = `P/E: ${pe}`;
      } catch { stock.financials = '載入失敗'; }
      saveStockToDB(stock);
      render();
    }

    window.handleNewsClick = (ticker) => {
      const stock = stocks.find(s => s.ticker === ticker);
      if (stock) loadNewsForStock(stock);
    };
    window.handleFinancialClick = (ticker) => {
      const stock = stocks.find(s => s.ticker === ticker);
      if (stock) loadFinancials(stock);
    };

    // ---------- 圖表 ----------
    window.showChart = async (ticker) => {
      if (!apiKey) { alert('請先設定 API Key'); return; }
      document.getElementById('chartTitle').innerText = `${ticker} 近30日K線`;
      document.getElementById('chartModal').style.display = 'flex';
      try {
        const to = Math.floor(Date.now()/1000);
        const from = to - 30*86400;
        const data = await callFinnhub('/stock/candle', { symbol: ticker, resolution: 'D', from, to });
        if (data.s !== 'ok') throw new Error('無歷史資料');
        const ohlc = data.t.map((t, i) => ({
          x: t * 1000, o: data.o[i], h: data.h[i], l: data.l[i], c: data.c[i]
        }));
        const ctx = document.getElementById('chartCanvas').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'candlestick',
          data: { datasets: [{ label: ticker, data: ohlc,
            color: { up: '#22c55e', down: '#ef4444', unchanged: '#999' }
          }] },
          options: { responsive: true, maintainAspectRatio: true }
        });
      } catch (e) { alert('圖表載入失敗: ' + e.message); }
    };

    // ---------- 新增手動股票 ----------
    window.openAddStockModal = () => document.getElementById('addModal').style.display = 'flex';
    window.addManualStock = async () => {
      const ticker = document.getElementById('newTicker').value.trim().toUpperCase();
      if (!ticker) return;
      const name = document.getElementById('newName').value.trim() || ticker;
      const category = document.getElementById('newCategory').value.trim() || '自選';
      if (stocks.find(s => s.ticker === ticker)) { alert('代號已存在'); return; }
      const newStock = { ticker, name, category, price:'-', change:0, open:'-', high:'-', low:'-', volume:'-', updated:'-', news:'點擊載入', financials:'點擊載入' };
      stocks.push(newStock);
      saveStockToDB(newStock);
      render();
      document.getElementById('addModal').style.display = 'none';
      await updateStockData(newStock);
      render();
    };

    // ---------- 渲染（含分類排序）----------
    function render(filtered = stocks) {
      // 相同分類排序在一起
      const sorted = [...filtered].sort((a, b) => {
        const catA = (a.category || '其他').toString();
        const catB = (b.category || '其他').toString();
        return catA.localeCompare(catB, 'zh-Hant') || a.ticker.localeCompare(b.ticker);
      });

      const list = document.getElementById('list');
      if (sorted.length === 0) {
        list.innerHTML = '<div class="p-4 text-center text-gray-500">尚無股票，請新增或匯入</div>';
        return;
      }
      let html = '';
      sorted.forEach(s => {
        const changeVal = parseFloat(s.change);
        const changeClass = !isNaN(changeVal) && changeVal >= 0 ? 'up' : 'down';
        html += `<div class="row ${changeClass === 'up' ? 'bg-up' : 'bg-down'}">
          <div class="cell ticker sticky">${s.ticker}</div>
          <div class="cell name">${s.name||'-'}</div>
          <div class="cell cat">${s.category||'-'}</div>
          <div class="cell price ${changeClass}">${s.price||'-'}</div>
          <div class="cell change ${changeClass}">${s.change??0}%</div>
          <div class="cell open">${s.open||'-'}</div>
          <div class="cell high">${s.high||'-'}</div>
          <div class="cell low">${s.low||'-'}</div>
          <div class="cell volume">${s.volume||'-'}</div>
          <div class="cell time">${s.updated||'-'}</div>
          <div class="cell long" onclick="handleNewsClick('${s.ticker}')">${s.news||'點擊載入'}</div>
          <div class="cell long" onclick="handleFinancialClick('${s.ticker}')">${s.financials||'點擊載入'}</div>
          <div class="cell ops">
            <button onclick="updateOne('${s.ticker}')" class="bg-gray-600 hover:bg-gray-500 px-2 py-0.5 text-xs rounded">更</button>
            <button onclick="showChart('${s.ticker}')" class="bg-gray-600 hover:bg-gray-500 px-2 py-0.5 text-xs rounded">圖</button>
            <button onclick="deleteStock('${s.ticker}')" class="bg-red-700 hover:bg-red-600 px-2 py-0.5 text-xs rounded">刪</button>
          </div>
        </div>`;
      });
      list.innerHTML = html;
    }
    window.render = render;

    // 搜尋
    document.getElementById('search').addEventListener('input', (e) => {
      const q = e.target.value.toUpperCase();
      render(stocks.filter(s => s.ticker.includes(q) || (s.name||'').toUpperCase().includes(q)));
    });

    // API 設定
    window.toggleApiSettings = () => document.getElementById('apiPanel').classList.toggle('hidden');
    window.saveApiKey = () => {
      apiKey = document.getElementById('apiKeyInput').value.trim();
      localStorage.setItem('finnhub_api_key', apiKey);
      updateApiStatusUI();
      document.getElementById('apiPanel').classList.add('hidden');
      alert('API Key 已儲存');
    };

    // CSV 匯出入
    window.exportCSV = () => {
      let csv = "代號,名稱,分類,價格,漲跌%,開盤,最高,最低,成交量,更新時間\n";
      stocks.forEach(s => csv += `${s.ticker},${s.name},${s.category},${s.price},${s.change},${s.open},${s.high},${s.low},${s.volume},${s.updated}\n`);
      const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'stocks.csv';
      a.click();
    };

    window.importCsvFile = (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        const rows = evt.target.result.split('\n').slice(1);
        rows.forEach(r => {
          const parts = r.split(',');
          if(parts.length < 3) return;
          const ticker = parts[0].trim().toUpperCase();
          if(!ticker) return;
          let stock = stocks.find(s=>s.ticker===ticker);
          if(!stock) {
            stock = { ticker, name: parts[1], category: parts[2] || 'CSV', news:'點擊載入', financials:'點擊載入', price:'-', change:0, open:'-', high:'-', low:'-', volume:'-', updated:'-' };
            stocks.push(stock);
          } else {
            stock.name = parts[1] || stock.name;
            stock.category = parts[2] || stock.category;
          }
          stock.price = parts[3] || stock.price;
          stock.change = parts[4] || 0;
          stock.open = parts[5] || '-';
          stock.high = parts[6] || '-';
          stock.low = parts[7] || '-';
          stock.volume = parts[8] || '-';
          stock.updated = parts[9] || new Date().toLocaleString();
          saveStockToDB(stock);
        });
        render();
      };
      reader.readAsText(file, 'utf-8');
    };

    // OCR 匯入（保留基本功能，名稱會後續修正）
    window.handleOCRUpload = async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const btn = document.getElementById('ocrBtn');
      btn.innerText = '辨識中...';
      btn.disabled = true;
      try {
        const worker = await Tesseract.createWorker('eng');
        const { data: { text } } = await worker.recognize(file);
        await worker.terminate();
        text.split('\n').forEach(line => {
          const m = line.match(/([A-Z]{2,6})\s+([\d,.]+)/);
          if(m){
            const ticker = m[1];
            const price = m[2].replace(',','');
            let exist = stocks.find(s=>s.ticker===ticker);
            if(exist) {
              exist.price = price;
            } else {
              stocks.unshift({ ticker, name:'OCR', price, category:'OCR', updated:new Date().toLocaleString(), news:'點擊載入', financials:'點擊載入', open:'-', high:'-', low:'-', volume:'-', change:0 });
            }
          }
        });
        render();
      } catch (ex) { alert('OCR失敗'); }
      btn.innerText = 'OCR匯入';
      btn.disabled = false;
    };

    window.updateAll = updateAll;
    if (!db) loadStocksFromDB();
  })();
</script>
</body>
</html>
