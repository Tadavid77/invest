<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資大師 Pro v6</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>

<style>
body { background:#000; color:#fff; }
.card { background:#1c1c1e; padding:15px; border-radius:15px; margin-bottom:10px;}
</style>
</head>

<body>

<header class="p-4">
<h1 class="text-2xl text-emerald-400 font-bold">投資大師 Pro</h1>

<input id="search" placeholder="搜尋..." class="w-full mt-2 p-2 rounded bg-gray-800">

<button onclick="showAddForm()" class="mt-3 bg-emerald-500 px-4 py-2 rounded">＋新增標的</button>
<input type="file" id="imageUpload" class="hidden" onchange="handleImageUpload(event)">
<button onclick="imageUpload.click()" class="mt-2 bg-blue-500 px-4 py-2 rounded">📸 掃描</button>

</header>

<div id="form-area" class="p-4 hidden">
<input id="ticker" placeholder="股票代號" class="w-full mb-2 p-2 bg-gray-800">
<input id="name" placeholder="名稱" class="w-full mb-2 p-2 bg-gray-800">
<input id="category" placeholder="分類" class="w-full mb-2 p-2 bg-gray-800">
<button onclick="addStock()" class="bg-green-500 px-4 py-2 rounded">儲存</button>
</div>

<main id="list" class="p-4"></main>

<script>

let stocks = JSON.parse(localStorage.getItem('stocks')) || [
{ticker:"NVDA", name:"NVIDIA", category:"AI", price:900, change:1.2, news:"", financials:"", advice:"AI龍頭"}
];

function save(){
localStorage.setItem('stocks', JSON.stringify(stocks));
render();
}

function render(){
let html = "";
stocks.forEach((s,i)=>{
html += `
<div class="card">
<div class="flex justify-between">
<div>
<div class="text-green-400 text-xs">${s.category}</div>
<div class="text-xl">${s.ticker}</div>
<div class="text-gray-400 text-sm">${s.name}</div>
</div>

<div class="text-right">
<div>${s.price||0}</div>
<div>${s.change||0}%</div>
</div>
</div>

<div class="text-xs mt-2">📊 建議：${s.advice||'無'}</div>

<div class="flex gap-2 mt-2">
<button onclick="deleteStock(${i})" class="bg-red-500 px-2 py-1 rounded text-xs">刪除</button>
</div>

</div>
`
});
document.getElementById("list").innerHTML = html;
}

function addStock(){
let s = {
ticker: ticker.value,
name: name.value,
category: category.value,
price:0,
change:0,
news:"",
financials:"",
advice:""
};
stocks.unshift(s);
save();
document.getElementById("form-area").classList.add("hidden");
}

function deleteStock(i){
stocks.splice(i,1);
save();
}

function showAddForm(){
document.getElementById("form-area").classList.toggle("hidden");
}

document.getElementById("search").addEventListener("input", e=>{
let t = e.target.value.toUpperCase();
render(stocks.filter(s=>s.ticker.includes(t)));
});

async function handleImageUpload(e){
const file = e.target.files[0];
if(!file) return;

const worker = await Tesseract.createWorker('eng');
const { data:{ text } } = await worker.recognize(file);

text.split('\n').forEach(line=>{
let m = line.match(/([A-Z0-9]{2,6})/);
if(m){
stocks.unshift({
ticker:m[1],
name:"掃描新增",
category:"OCR",
price:0
});
}
});

save();
await worker.terminate();
}

render();

</script>
</body>
</html>
