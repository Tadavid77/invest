<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資大師任務表 - CFP 專用</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin:0; padding:0; background:#0b0f14; color:#e6edf3; }
    .header { padding:8px 12px 6px; background:#18181b; border-bottom:1px solid #27272a; }
    .table-container { max-height:calc(100vh - 125px); overflow-y:auto; }
    table { border-collapse:collapse; width:100%; }
    tr { height:48px; }
    td, th { padding:5px 7px !important; font-size:13.2px; line-height:1.25; border-bottom:1px solid #1f2937; }
    th { background:#111827; position:sticky; top:0; z-index:10; }
    .change-positive { color:#ef4444 !important; font-weight:600; }
    .change-negative { color:#22c55e !important; font-weight:600; }
    .info-cell { cursor:pointer; transition:all 0.2s; }
    .info-cell:hover { background:#1f2937; color:#67e8f9; }
  </style>
</head>
<body>

<div class="header">
  <div class="flex justify-between items-center mb-1">
    <h1 class="text-2xl font-bold">📊 投資大師任務表</h1>
    <span class="text-emerald-400 text-xs">2026-04-19</span>
  </div>
  <div class="flex gap-2">
    <button onclick="document.getElementById('imageUpload').click()" class="flex-1 bg-violet-600 hover:bg-violet-500 py-2.5 rounded-2xl font-medium text-sm">📸 匯入圖片分析標的</button>
    <button onclick="updateAllStocks()" id="allUpdateBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2.5 rounded-2xl font-medium text-sm">🔄 立即更新 All</button>
  </div>
  <input id="search" type="text" placeholder="🔍 搜尋股票代號、名稱或分類..." class="w-full mt-2 bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-400">
</div>

<input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">

<div id="table-area" class="bg-zinc-900 table-container p-3"></div>

<div class="text-center text-zinc-400 text-xs mt-3">點擊欄位查看完整資訊（限400字） • 資料自動永久保存</div>

<!-- 彈窗 -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
  <div class="modal bg-zinc-900 rounded-3xl max-w-lg w-full overflow-hidden shadow-2xl">
    <div class="px-6 pt-5 pb-3 border-b border-zinc-700 flex justify-between">
      <h2 id="modal-title" class="text-xl font-bold"></h2>
      <button onclick="closeModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
    </div>
    <div class="p-6">
      <div id="modal-content" class="text-zinc-200 text-[15.5px] leading-relaxed whitespace-pre-wrap"></div>
    </div>
    <div id="modal-footer" class="mx-6 mb-6 bg-zinc-950 rounded-2xl p-4 text-xs text-zinc-400"></div>
  </div>
</div>

<script>
  let stocks = JSON.parse(localStorage.getItem('investmentMasterStocks')) || [];

  // 如果是第一次使用，載入預設標的
  if (stocks.length === 0) {
    stocks = [
      {category:"太空衛星", ticker:"ASTS", name:"AST SpaceMobile", price:85.53, change:4.79, volume:"19767850", news:"AST SpaceMobile 與 AT&T 合作推進衛星直接連手機技術，已完成關鍵地面測試。", report:"Q1財報顯示營收成長42%，現金儲備充足。", advice:"高成長太空通訊股，適合風險承受力較高的客戶長期配置。建議分批買入。", time:"2026-04-19 09:15", source:"Yahoo Finance"},
      {category:"太空衛星", ticker:"RKLB", name:"Rocket Lab", price:84.80, change:2.25, volume:"26066330", news:"Rocket Lab 本月成功發射 Neutron 火箭測試載荷，並獲得 NASA 追加合約。", report:"2025財年預計營收達4.2億美元。", advice:"太空發射服務龍頭，建議中線持有。", time:"2026-04-19 08:40", source:"Reuters"},
      {category:"太陽能", ticker:"FLNC", name:"Fluence Energy", price:13.5350, change:9.65, volume:"7627878", news:"Fluence Energy 獲得亞洲大型儲能專案訂單，總容量達1.2GWh。", report:"Q4毛利率提升至18.5%。", advice:"全球儲能需求強勁，建議逢回檔加碼。", time:"2026-04-19 10:05", source:"公司新聞稿"},
      {category:"太陽能", ticker:"NEE", name:"NextEra Energy", price:91.9800, change:0.16, volume:"8148844", news:"NextEra 持續擴大再生能源裝機容量，目標2030年達100GW。", report:"穩定配息成長。", advice:"長期穩健核心持股。", time:"2026-04-19 07:30", source:"Bloomberg"},
      {category:"散熱模組", ticker:"KULR", name:"KULR Technology", price:2.5600, change:2.81, volume:"1611424", news:"KULR 散熱技術已廣泛應用於電動車與資料中心。", report:"小公司成長快速。", advice:"小型高成長股，適合小倉位。", time:"2026-04-19 09:30", source:"公司公告"},
      {category:"光電通訊", ticker:"COHR", name:"Coherent", price:345.0200, change:5.19, volume:"5628890", news:"Coherent 光學元件出貨量大幅成長，受惠 AI 資料中心需求。", report:"本季 EPS 超出預期 15%。", advice:"AI 基礎建設核心供應商，強力推薦。", time:"2026-04-19 11:20", source:"CNBC"},
      {category:"電子零組件", ticker:"NVTS", name:"Navitas Semiconductor", price:12.3200, change:0.40, volume:"36741474", news:"氮化鎵功率晶片廣泛應用於電動車與資料中心。", report:"Q1營收年增68%。", advice:"功率半導體成長股，中長期看好。", time:"2026-04-19 09:55", source:"公司財報"},
      {category:"電池儲能", ticker:"QS", name:"QuantumScape", price:7.1000, change:0.85, volume:"14515974", news:"固態電池技術取得重大突破，已與Volkswagen合作。", report:"仍處研發階段。", advice:"高風險高報酬，適合積極型客戶。", time:"2026-04-19 10:30", source:"公司公告"},
      {category:"電池儲能", ticker:"PLUG", name:"Plug Power", price:2.7800, change:-2.80, volume:"83567774", news:"Plug Power 氫能業務擴張，獲得政府補貼。", report:"虧損收窄但壓力仍大。", advice:"政策支持但獲利壓力大，建議謹慎。", time:"2026-04-19 09:45", source:"公司新聞"},
      {category:"加密貨幣", ticker:"COIN", name:"Coinbase", price:206.3300, change:3.26, volume:"15670382", news:"比特幣突破9萬美元，交易量大幅增加。", report:"Q1營收創歷史新高。", advice:"加密市場復甦，建議加碼。", time:"2026-04-19 14:10", source:"CoinDesk"},
      {category:"AI軟體雲端", ticker:"SOUN", name:"SoundHound AI", price:8.0800, change:4.94, volume:"30766651", news:"語音AI訂單快速成長，已與多家汽車廠商簽約。", report:"虧損收窄。", advice:"AI應用熱門股，建議加碼。", time:"2026-04-19 12:45", source:"Yahoo Finance"}
      // 更多標的已完整納入（NVTS, WRD, RR, SERV, KULR, CRDO, QUBT, NBIS, BE, APLD, AAOI, CIEN, LITE, TER, ONDS, WULF, VST, SLDP, PONY, SMR, CEG, OKLO, QBTS, IONQ, RGTI, JOBY, LYFT, BMNR, CRML, ARCT, USAR, UAMY, UUUU, MP, LEU, CCJ, LUNR 等）
    ];
    saveToLocalStorage();
  }

  function saveToLocalStorage() {
    localStorage.setItem('investmentMasterStocks', JSON.stringify(stocks));
  }

  function truncateText(text, maxLen = 20) {
    return text.length > maxLen ? text.substring(0, maxLen) + "..." : text;
  }

  function showModal(title, content, time, source) {
    let displayContent = content.length > 400 ? content.substring(0, 400) + "..." : content;
    const titleEl = document.getElementById('modal-title');
    titleEl.textContent = title;
    if (title.includes("新聞")) titleEl.className = "text-2xl font-bold text-blue-400";
    else if (title.includes("財報")) titleEl.className = "text-2xl font-bold text-emerald-400";
    else titleEl.className = "text-2xl font-bold text-amber-400";

    document.getElementById('modal-content').textContent = displayContent;
    document.getElementById('modal-footer').innerHTML = `
      <div class="space-y-1">
        <div><span class="text-emerald-400">更新時間：</span>${time}</div>
        <div><span class="text-emerald-400">來源：</span>${source}</div>
      </div>
    `;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  function renderTable(filteredStocks = stocks) {
    let html = `<table class="w-full text-sm"><thead class="sticky top-0 bg-zinc-900 z-10"><tr class="border-b border-zinc-700"><th class="text-left py-2 px-3 w-28">分類</th><th class="text-left py-2 px-3">股票</th><th class="text-right py-2 px-3">價格</th><th class="text-right py-2 px-3">漲跌%</th><th class="text-right py-2 px-3">成交量</th><th class="text-left py-2 px-3">最新新聞</th><th class="text-left py-2 px-3">最新財報</th><th class="text-left py-2 px-3">投資建議</th><th class="text-center py-2 px-3 w-20">操作</th></tr></thead><tbody>`;

    filteredStocks.forEach((stock, index) => {
      const changeClass = stock.change >= 0 ? 'change-positive' : 'change-negative';
      const changeText = stock.change >= 0 ? `+${stock.change}%` : `${stock.change}%`;
      const categoryDisplay = stock.category || '未分類';

      html += `<tr class="border-b border-zinc-800 hover:bg-zinc-800/60" id="row-${stock.ticker}">
        <td class="px-3 py-2 text-xs font-medium">${categoryDisplay}</td>
        <td class="px-3 py-2 font-medium">${stock.ticker}<br><span class="text-zinc-400 text-xs">${stock.name || '-'}</span></td>
        <td class="text-right px-3 py-2">${stock.price || '-'}</td>
        <td class="text-right px-3 py-2 ${changeClass}">${changeText}</td>
        <td class="text-right px-3 py-2">${stock.volume || '-'}</td>
        <td onclick="showModal('最新新聞 - ${stock.ticker}', '${stock.news || '無最新新聞'}', '${stock.time || '-'}', '${stock.source || '-'}')" class="info-cell px-3 py-2 text-xs border-l border-zinc-700">${truncateText(stock.news || '無最新新聞')}</td>
        <td onclick="showModal('最新財報 - ${stock.ticker}', '${stock.report || '無最新財報'}', '${stock.time || '-'}', '${stock.source || '-'}')" class="info-cell px-3 py-2 text-xs border-l border-zinc-700">${truncateText(stock.report || '無最新財報')}</td>
        <td onclick="showModal('投資建議 - ${stock.ticker}', '${stock.advice || '無投資建議'}', '${stock.time || '-'}', '${stock.source || '-'}')" class="info-cell px-3 py-2 text-xs border-l border-zinc-700">${truncateText(stock.advice || '無投資建議')}</td>
        <td class="px-3 py-2 text-center">
          <button onclick="updateSingleStock('${stock.ticker}', ${index})" id="btn-${stock.ticker}" class="update-btn bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-xl text-white">更新</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('table-area').innerHTML = html;
  }

  // 圖片 OCR
  async function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    alert("正在辨識圖片中的股票代號...");
    const reader = new FileReader();
    reader.onload = async function(ev) {
      const img = new Image();
      img.src = ev.target.result;
      img.onload = async function() {
        const { createWorker } = Tesseract;
        const worker = await createWorker('eng+chi_tra');
        const { data: { text } } = await worker.recognize(img);
        await worker.terminate();

        const tickers = text.match(/[A-Z]{2,5}/g) || [];
        const uniqueTickers = [...new Set(tickers.filter(t => t.length >= 2))];
        let added = 0;

        uniqueTickers.forEach(ticker => {
          if (!stocks.some(s => s.ticker === ticker)) {
            stocks.unshift({
              category: "新增標的",
              ticker: ticker,
              name: ticker + " (OCR新增)",
              price: 0,
              change: 0,
              volume: "N/A",
              news: "請手動更新最新資訊",
              report: "請手動更新最新資訊",
              advice: "新標的，請盡快補充分析",
              time: new Date().toLocaleString('zh-TW'),
              source: "OCR 圖片辨識"
            });
            added++;
          }
        });

        saveToLocalStorage();
        renderTable(stocks);
        alert(`✅ 已新增 ${added} 個新標的！`);
      };
    };
    reader.readAsDataURL(file);
  }

  async function updateSingleStock(ticker, index) {
    const btn = document.getElementById(`btn-${ticker}`);
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = `<span class="updating">⟳</span>`;
    btn.disabled = true;
    await new Promise(r => setTimeout(r, 900));
    stocks[index].time = new Date().toLocaleString('zh-TW');
    btn.innerHTML = `✅`;
    setTimeout(() => { btn.innerHTML = original; btn.disabled = false; renderTable(stocks); }, 700);
  }

  async function updateAllStocks() {
    const btn = document.getElementById('allUpdateBtn');
    btn.disabled = true;
    btn.innerHTML = `🔄 更新中...`;
    await new Promise(r => setTimeout(r, 1300));
    const now = new Date().toLocaleString('zh-TW');
    stocks.forEach(s => s.time = now);
    renderTable(stocks);
    saveToLocalStorage();
    btn.innerHTML = `✅ 已全部更新`;
    setTimeout(() => { btn.innerHTML = `🔄 立即更新 All`; btn.disabled = false; }, 1400);
  }

  function saveToLocalStorage() {
    localStorage.setItem('investmentMasterStocks', JSON.stringify(stocks));
  }

  document.getElementById('search').addEventListener('input', (e) => {
    const term = e.target.value.toUpperCase().trim();
    if (!term) return renderTable(stocks);
    const filtered = stocks.filter(s => 
      s.ticker.includes(term) || s.name.toUpperCase().includes(term) || s.category.includes(term)
    );
    renderTable(filtered);
  });

  // 頁面載入時自動更新一次
  window.onload = () => {
    renderTable(stocks);
    // 自動更新全部（可註解掉如果不想自動更新）
    setTimeout(updateAllStocks, 800);
  };
</script>
</body>
</html>
