<!DOCTYPE html>

<html lang="zh-TW">
<head>

  <style>
    :root{
      --safe-top:env(safe-area-inset-top);
      --safe-bot:env(safe-area-inset-bottom);

      --tx:#e6edf3;--mt:#9ca3af;

    body{
      background:var(--bg);color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
      margin:0;padding:0;
      height:100vh;height:-webkit-fill-available;
      display:flex;flex-direction:column;overflow:hidden;
      padding-top:var(--safe-top);padding-bottom:var(--safe-bot);
    }

    /* ── 頭部 ── */
    header{flex-shrink:0;background:var(--sf2);border-bottom:1px solid var(--bd);padding:8px 12px;z-index:50;}
    .hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
    .hdr-top h1{font-size:1.15rem;font-weight:700;color:var(--gr);margin:0;}
    .hdr-btns{display:flex;gap:4px;flex-wrap:wrap;}
    .hdr-btns button{font-size:10px;padding:4px 8px;border-radius:6px;font-weight:600;white-space:nowrap;}
    .api-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;}
    .api-row input{flex:1;background:var(--bg);border:1px solid var(--bd2);padding:5px 8px;border-radius:6px;color:white;font-size:11px;}
    .add-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
    .add-row input{background:var(--sf);border:1px solid var(--bd2);padding:5px 8px;border-radius:6px;color:white;font-size:11px;}
    .st-txt{font-size:10px;color:var(--mt);}

    /* ── 表格 ── */
    .tbl-wrap{flex:1;overflow:auto;background:var(--bg);-webkit-overflow-scrolling:touch;}
    .tbl-scroll{min-width:1300px;display:flex;flex-direction:column;}
    .row{display:flex;min-height:40px;align-items:stretch;}
    .row>div{
      padding:5px 8px;display:flex;align-items:center;
      border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;
    }
    .row>div:last-child{border-right:none;}
    .row:hover{background:rgba(255,255,255,.025);}
    .hdr-row{position:sticky;top:0;z-index:30;background:var(--sf);font-weight:700;color:#e5e7eb;}
    .hdr-row>div{background:var(--sf);font-size:11px;}
    .col-tk{position:sticky;left:0;z-index:20;background:var(--bg);font-weight:700;border-right:2px solid var(--bd2)!important;}
    .hdr-row .col-tk{background:var(--sf);z-index:40;}
    .row:hover .col-tk{background:#0f1520;}

    /* 欄寬 */
    .w-tk{width:85px;}
    .w-nm{width:170px;}
    .w-ct{width:105px;}
    .w-pr{width:82px;justify-content:flex-end;}
    .w-ch{width:78px;justify-content:flex-end;}
    .w-oc{width:78px;justify-content:flex-end;}
    .w-vl{width:100px;justify-content:flex-end;}
    .w-tm{width:118px;justify-content:center;}
    .w-nw,.w-fn{width:100px;justify-content:center;}
    .w-ac{width:140px;justify-content:center;gap:4px;border-right:none;}

    .up  {color:var(--rd);}
    .dn  {color:#22c55e;}
    .flat{color:var(--mt);}

    button{transition:all .15s;font-weight:500;border-radius:4px;cursor:pointer;border:none;}
    button:active{transform:scale(.94);opacity:.85;}

    .prog-bar {height:3px;background:#1e293b;border-radius:10px;margin:3px 0;}
    .prog-fill{height:3px;background:var(--bl);border-radius:10px;width:0%;transition:width .25s;}

    /* ── Modal ── */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
    .mbox{background:#0f172a;padding:22px;border-radius:18px;width:100%;max-width:640px;max-height:84vh;overflow-y:auto;border:1px solid #334155;box-shadow:0 25px 60px rgba(0,0,0,.7);}
    .mclose{width:100%;margin-top:18px;background:#1e293b;padding:10px;border-radius:12px;font-weight:700;font-size:13px;color:var(--tx);}
    .news-card{background:#1e293b;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:#cbd5e1;border-left:3px solid var(--bl);}
    .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 16px;background:#1e293b;border-radius:8px;padding:12px;border-left:3px solid var(--gr);}
    .fin-lbl{font-size:10px;color:#6b7280;}
    .fin-val{font-size:12px;font-weight:600;color:#e2e8f0;text-align:right;}

    /* ── 系統條 ── */
    #offBar{display:none;background:#7c3aed;color:white;text-align:center;font-size:11px;font-weight:600;padding:4px;flex-shrink:0;}
    #instBar{display:none;background:#1e3a5f;color:white;padding:8px 14px;font-size:11px;font-weight:600;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #2563eb;}
    #instBar button{background:var(--bl);color:white;font-size:11px;padding:4px 12px;border-radius:6px;font-weight:700;}

    /* ── Toast ── */
    #toast{
      position:fixed;bottom:calc(24px + var(--safe-bot));
      left:50%;transform:translateX(-50%) translateY(20px);
      background:#1e293b;color:white;padding:10px 22px;
      border-radius:50px;font-size:12px;font-weight:600;
      border:1px solid #334155;z-index:300;
      opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── Spinner ── */
    .spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    /* ── K線區間按鈕 ── */
    .rbtn{background:#1e293b;color:#9ca3af;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid #334155;}
    .rbtn.act{background:var(--bl)!important;color:white!important;border-color:#2563eb!important;}
  </style>

</head>

<script>
/* ══════════════════════════════════════════════════════
   投資大師 Pro MAX  v12.4  — 最終完整修正版
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   修正清單（相對 v12.2）：
   A. updateStock 每次強制更新 name/category/ohlc/volume
   B. fetchQuote 用 /quote.v 取成交量＋volCache 備援
   C. fetchProfile 正確判斷無效回應（空物件）
   D. 行業中文對照表 90+ 條，涵蓋 Finnhub 所有主要分類
   E. 分類保護：userCat=true 且非垃圾才保留；否則 API 覆寫
   F. sanitize 清洗所有舊版垃圾 name/category
   G. IndexedDB 升級至 v2，清除舊格式資料
   H. loadDB 完成後若有「名稱=代號」或「未分類」自動排隊更新
   I. OCR 新增的股票自動呼叫 updateStock 補全資料
   J. updateAll/updateOne 均呼叫完整 updateStock
   K. 新聞/財報按鈕邏輯：載入→讀取中→查看/無新聞/失敗
   L. K線圖：luxon adapter 相容＋成交量疊加＋區間切換
   M. PWA：manifest/SW/離線提示/Android 安裝橫幅
   N. CSV：支援含逗號欄位正確解析
   O. 搜尋：代號/名稱/分類三欄即時篩選
══════════════════════════════════════════════════════ */
(function(){
'use strict';

/* ═══════════ 全域狀態 ═══════════ */
let db=null, stocks=[], chartInst=null;
let curTicker=null, curDays=30;
let apiKey=localStorage.getItem('FINNHUB_KEY')||'';
let deferPWA=null;
const volCache={};   // 成交量備援快取（跨更新循環保留）

if(apiKey) document.getElementById('apiKey').value=apiKey;

/* ═══════════ 工具函式 ═══════════ */
const isNum =s=>/^\d+(\.\d+)?$/.test((s||'').toString().trim());
const isGood=v=>typeof v==='number'&&isFinite(v)&&v>0;
const f2    =v=>parseFloat(v||0).toFixed(2);
const fVol  =v=>{
  const n=Number(v);
  if(!n||isNaN(n))return '-';
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
};

/* ═══════════ Toast ═══════════ */
let toastTmr=null;
function toast(msg,ms=2800){
  const el=document.getElementById('toast');
  el.innerText=msg;el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),ms);
}

/* ═══════════ PWA ═══════════ */
if('serviceWorker'in navigator)
  navigator.serviceWorker.register('./sw.js').catch(()=>{});

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferPWA=e;
  document.getElementById('instBar').style.display='flex';
});
document.getElementById('instBtn').addEventListener('click',async()=>{
  if(!deferPWA)return;
  deferPWA.prompt();
  const r=await deferPWA.userChoice;
  deferPWA=null;
  document.getElementById('instBar').style.display='none';
  if(r.outcome==='accepted')toast('✅ 已加入主畫面！');
});
window.addEventListener('appinstalled',()=>toast('🎉 App 安裝成功！'));

const chkOnline=()=>{
  document.getElementById('offBar').style.display=navigator.onLine?'none':'block';
};
window.addEventListener('online',chkOnline);
window.addEventListener('offline',chkOnline);
chkOnline();

/* ═══════════ API Key UI ═══════════ */
function updateApiUI(){
  const el=document.getElementById('apiSt');
  if(apiKey){el.style.color='#34d399';el.innerText='🟢 API Key 已設定';}
  else      {el.style.color='#9ca3af';el.innerText='⚪ 未設定 API Key';}
}
updateApiUI();

window.saveKey=()=>{
  const k=document.getElementById('apiKey').value.trim();
  if(!k){toast('⚠️ API Key 不能為空');return;}
  apiKey=k;localStorage.setItem('FINNHUB_KEY',k);
  updateApiUI();toast('✅ API Key 已儲存');
};

/* ════════════════════════════════════════
   G. IndexedDB v2（升版清除舊格式衝突）
════════════════════════════════════════ */
/* ── 垃圾值清單 ── */
const JUNK_NM=new Set(['OCR','CSV','OCR掃描','掃描新增','新掃描','未知','未命名','undefined','null','']);
const JUNK_CT=new Set(['OCR','CSV','OCR掃描','掃描新增','CSV匯入','undefined','null','']);

const dbReq=indexedDB.open('stockDB_v2',1);  // 版本升為 v2，舊 v12 不衝突
dbReq.onupgradeneeded=e=>{
  db=e.target.result;
  if(!db.objectStoreNames.contains('stocks'))
    db.createObjectStore('stocks',{keyPath:'ticker'});
};
dbReq.onsuccess=e=>{db=e.target.result;loadDB();};
dbReq.onerror  =()=>{console.warn('IndexedDB 不可用');render();};

/* ─ 建立空白股票物件 ─ */
function mkStock(ticker,name,cat){
  return{
    ticker,
    name    :name||ticker,
    category:cat||'未分類',
    price:0,change:0,open:0,high:0,low:0,volume:0,
    updated:'-',
    news:'',newsItems:[],
    financials:'',finData:{},
    history:{news:[],fin:[],adv:[]},
    userCat:false,   // 是否為使用者手動設定的分類
    needUpdate:true  // 標記：是否需要從 API 補全資料
  };
}

/* ════════════════════════════════════════
   F. sanitize：程式啟動時清洗舊資料垃圾值
════════════════════════════════════════ */
function sanitize(s){
  if(!s.history)   s.history  ={news:[],fin:[],adv:[]};
  if(!s.newsItems) s.newsItems=[];
  if(!s.finData)   s.finData  ={};
  if(s.userCat===undefined) s.userCat=false;

  // 清洗垃圾名稱 → 還原成代號，等更新補回
  const nm=(s.name||'').trim();
  if(!nm||JUNK_NM.has(nm)||isNum(nm)||nm===s.ticker){
    s.name=s.ticker;
    s.needUpdate=true;
  }

  // 清洗垃圾分類 → 未分類，等更新補回
  const ct=(s.category||'').trim();
  if(!ct||JUNK_CT.has(ct)||isNum(ct)||ct==='未分類'){
    s.category='未分類';
    s.userCat=false;
    s.needUpdate=true;
  }

  if(!isGood(Number(s.price)))s.price=0;
  return s;
}

function saveToDB(s){
  if(!db)return;
  db.transaction('stocks','readwrite').objectStore('stocks').put(s);
}
function delFromDB(ticker){
  if(!db)return;
  db.transaction('stocks','readwrite').objectStore('stocks').delete(ticker);
}

/* ════════════════════════════════════════
   H. loadDB 完成後自動補全需要更新的資料
════════════════════════════════════════ */
function loadDB(){
  if(!db)return;
  const r=db.transaction('stocks','readonly').objectStore('stocks').getAll();
  r.onsuccess=()=>{
    stocks=(r.result||[]).map(sanitize);
    if(!stocks.length){
      const s=mkStock('AAPL','Apple Inc.','科技');
      s.needUpdate=false; // 預設示範資料不需要立即更新
      stocks.push(s);saveToDB(s);
    }
    render();
    if(apiKey){
      // 有 API Key 就立即更新全部（自動補全名稱/分類/成交量）
      setTimeout(updateAll,600);
    }
  };
}

/* ════════════════════════════════════════
   Finnhub API 呼叫
════════════════════════════════════════ */
async function callAPI(path,params={}){
  if(!apiKey)throw new Error('NO_KEY');
  const url=new URL(`https://finnhub.io/api/v1${path}`);
  url.searchParams.set('token',apiKey);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res=await fetch(url,{signal:AbortSignal.timeout(10000)});
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  return res.json();
}

/* ════════════════════════════════════════
   B. fetchQuote：報價 + 成交量
   /quote.v = 當日累計成交量（最穩定來源）
   非交易時段 v=0 時，沿用 volCache 保留上次有效值
════════════════════════════════════════ */
async function fetchQuote(ticker){
  try{
    const d=await callAPI('/quote',{symbol:ticker});
    const c=Number(d.c);
    if(!isGood(c))return null;   // 無效報價（未上市/代號錯誤）

    const o=Number(d.o),h=Number(d.h),l=Number(d.l),v=Number(d.v);

    // 成交量備援：有值存快取；無值用快取上次值
    let vol=0;
    if(v>0){vol=v;volCache[ticker]=v;}
    else if(volCache[ticker]>0){vol=volCache[ticker];}

    return{
      price :c,
      change:Number(d.dp)||0,
      open  :isGood(o)?o:0,
      high  :isGood(h)?h:0,
      low   :isGood(l)?l:0,
      volume:vol
    };
  }catch{return null;}
}

/* ════════════════════════════════════════
   C. fetchProfile：公司名稱 + 行業分類
   修正：Finnhub 對無效代號回傳空物件 {}
         用 Object.keys(d).length===0 判斷
════════════════════════════════════════ */
async function fetchProfile(ticker){
  try{
    const d=await callAPI('/stock/profile2',{symbol:ticker});
    // 空物件 = 無效代號
    if(!d||Object.keys(d).length===0||!d.name)return null;
    return{
      name    :(d.name||'').trim(),
      industry:(d.finnhubIndustry||'').trim()
    };
  }catch{return null;}
}

function toZhCat(industry){
  if(!industry)return null;
  const r=industry.trim();if(!r)return null;
  // 完全比對
  if(IND[r])return IND[r];
  // 部分比對（取第一個命中）
  for(const[en,zh]of Object.entries(IND))
    if(r.toLowerCase().includes(en.toLowerCase()))return zh;
  // 找不到：保留英文原文（不回傳「未分類」）
  return r;
}

/* ════════════════════════════════════════
   A/E. updateStock — 每次強制更新所有欄位
   ・報價：price / change / open / high / low / volume
   ・公司：name / category（遵守 userCat 保護）
════════════════════════════════════════ */
async function updateStock(s){

  /* ── Step 1：報價（含成交量）── */
  const q=await fetchQuote(s.ticker);
  if(q){
    s.price =q.price;
    s.change=q.change;
    // open/high/low：API 有值就強制覆寫
    if(q.open >0)s.open =q.open;
    if(q.high >0)s.high =q.high;
    if(q.low  >0)s.low  =q.low;
    // volume：有值覆寫；備援快取已在 fetchQuote 處理
    if(q.volume>0)s.volume=q.volume;
    s.updated=new Date().toLocaleString('zh-TW',{hour12:false});
  }else{
    // 報價失敗：只標記更新失敗，保留舊數值
    s.updated='⚠️ 更新失敗';
  }

  /* ── Step 2：公司資料（名稱 + 分類）── 每次都強制呼叫 */
  const p=await fetchProfile(s.ticker);
  if(p){
    // 名稱：API 有回傳就直接覆寫（確保顯示正式公司名）
    if(p.name)s.name=p.name;

    /* E. 分類保護規則：
       ・userCat=true  且  category 不是垃圾值  → 保留使用者手動設定
       ・其餘所有情況（含「未分類」）→ 用 API 行業資料覆寫          */
    const keepUser=s.userCat&&s.category&&s.category!=='未分類'&&!JUNK_CT.has(s.category);
    if(!keepUser){
      const zh=toZhCat(p.industry);
      s.category=zh||'未分類';
    }
  }else{
    // Profile API 失敗（無效代號或網路）：至少清除垃圾名稱
    if(!s.name||JUNK_NM.has(s.name)||s.name===s.ticker)
      s.name=s.ticker;
  }

  s.needUpdate=false;
  saveToDB(s);
}

   J. 全部更新
════════════════════════════════════════ */
async function updateAll(){
  if(!apiKey){toast('⚠️ 請先設定 API Key');return;}
  if(!navigator.onLine){toast('📡 離線狀態，無法更新');return;}

  const wrap=document.getElementById('progWrap');
  const fill=document.getElementById('progFill');
  const ctEl=document.getElementById('progCt');
  wrap.classList.remove('hidden');
  fill.style.width='0%';
  let done=0;const total=stocks.length;
  ctEl.innerText=`0/${total}`;

  // 3 個並行 worker（避免超過 Finnhub 免費版 30 req/s）
  const queue=[...stocks];
  const worker=async()=>{
    while(queue.length){
      const s=queue.shift();
      try{await updateStock(s);}catch(e){console.warn(s.ticker,e);}
      done++;
      fill.style.width=(done/total*100)+'%';
      ctEl.innerText=`${done}/${total}`;
      render();
    }
  };
  await Promise.allSettled([worker(),worker(),worker()]);
  toast(`✅ 已更新 ${total} 筆`);
  setTimeout(()=>wrap.classList.add('hidden'),2000);
}

async function loadNews(s){
  if(!apiKey){s.news='需API';saveToDB(s);render();return;}
  s.news='loading';render();
  try{
    const from=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
    const to  =new Date().toISOString().split('T')[0];
    const data=await callAPI('/company-news',{symbol:s.ticker,from,to});
    if(data?.length){
      s.newsItems=data.slice(0,6).map(n=>({
        headline:n.headline,source:n.source,url:n.url,datetime:n.datetime
      }));
      s.news='loaded';
    }else{s.newsItems=[];s.news='無近期新聞';}
  }catch{s.news='載入失敗';}
  saveToDB(s);render();
}

async function drawChart(ticker,days){
  const canvas=document.getElementById('chartCvs');
  const ctx=canvas.getContext('2d');
  if(chartInst){chartInst.destroy();chartInst=null;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#6b7280';ctx.font='14px system-ui';ctx.textAlign='center';
  ctx.fillText('載入中...',canvas.width/2,canvas.height/2);
  try{
    const to=Math.floor(Date.now()/1000),from=to-days*86400;
    const res=days<=7?'60':'D';
    const data=await callAPI('/stock/candle',{symbol:ticker,resolution:res,from,to});
    if(data.s!=='ok'||!data.t?.length)throw new Error('無K線資料，可能為非交易日');

    const ohlc=data.t.map((t,i)=>({x:t*1000,o:data.o[i],h:data.h[i],l:data.l[i],c:data.c[i]}));
    const vols=data.t.map((t,i)=>({x:t*1000,y:data.v?.[i]||0}));
    canvas.style.height='420px';

    chartInst=new Chart(ctx,{
      data:{datasets:[
        {type:'candlestick',label:ticker,data:ohlc,
         color:{up:'#ff4d4f',down:'#22c55e',unchanged:'#9ca3af'},yAxisID:'y'},
        {type:'bar',label:'成交量',data:vols,yAxisID:'y2',
         backgroundColor:ohlc.map(d=>d.c>=d.o?'rgba(255,77,79,.35)':'rgba(34,197,94,.35)')}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index'},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>{
            if(c.dataset.type==='candlestick'){
              const d=c.raw;
              return[
                `開:${d.o?.toFixed(2)}  高:${d.h?.toFixed(2)}`,
                `低:${d.l?.toFixed(2)}  收:${d.c?.toFixed(2)}`
              ];
            }
            return`量:${fVol(c.raw.y)}`;
          }}}
        },
        scales:{
          x:{type:'time',
             time:{unit:days<=7?'hour':(days<=90?'day':'week')},
             ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1f2937'}},
          y:{position:'right',ticks:{color:'#9ca3af',font:{size:10}},grid:{color:'#1f2937'}},
          y2:{position:'left',
              max:()=>Math.max(...vols.map(v=>v.y))*4,
              ticks:{display:false},grid:{display:false}}
        }
      }
    });
  }catch(e){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#ef4444';ctx.font='13px system-ui';ctx.textAlign='center';
    ctx.fillText(`⚠️ ${e.message}`,canvas.width/2,200);
  }
}

   N. CSV 匯入 / 匯出
════════════════════════════════════════ */
function parseCSVLine(line){
  const out=[];let cur='',inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){out.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  out.push(cur.trim());return out;
}

window.importCSV=e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=evt=>{
    const lines=evt.target.result.split('\n').slice(1);
    let added=0,updated=0;
    lines.forEach(raw=>{
      if(!raw.trim())return;
      const c=parseCSVLine(raw);
      const ticker=(c[0]||'').toUpperCase();if(!ticker)return;
      let s=stocks.find(x=>x.ticker===ticker);
      if(!s){
        const cat=c[2]||'未分類';
        s=mkStock(ticker,c[1]||ticker,cat);
        s.userCat=(cat!==''&&cat!=='未分類');
        stocks.push(s);added++;
      }else{updated++;}
      if(c[1])s.name=c[1];
      if(c[2]&&c[2]!=='未分類'){s.category=c[2];s.userCat=true;}
      s.price  =parseFloat(c[3])||s.price;
      s.change =parseFloat(c[4])||s.change;
      s.open   =parseFloat(c[5])||s.open;
      s.high   =parseFloat(c[6])||s.high;
      s.low    =parseFloat(c[7])||s.low;
      s.volume =parseFloat(c[8])||s.volume;
      if(c[9])s.updated=c[9];
      saveToDB(s);
    });
    render();
    toast(`📥 匯入：新增 ${added}，更新 ${updated} 筆`);
    // 匯入後若有 API Key，自動更新補全資料
    if(apiKey&&(added>0))setTimeout(updateAll,500);
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
};

window.exportCSV=()=>{
  let csv='\uFEFF代號,名稱,分類,成交,漲跌%,開盤,最高,最低,成交量,更新時間\n';
  stocks.forEach(s=>{
    csv+=[
      s.ticker,
      `"${(s.name||'').replace(/"/g,'""')}"`,
      `"${(s.category||'').replace(/"/g,'""')}"`,
      f2(s.price),f2(s.change),f2(s.open),f2(s.high),f2(s.low),
      s.volume||0,
      `"${(s.updated||'').replace(/"/g,'""')}"`
    ].join(',')+'\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`stocks_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();toast('📤 匯出完成');
};

/* ════════════════════════════════════════
   I. OCR（新增後自動 updateStock 補全資料）
════════════════════════════════════════ */
window.handleOCR=async event=>{
  const file=event.target.files[0];if(!file)return;
  const btn=document.getElementById('ocrBtn');
  btn.innerHTML='<span class="spin"></span> 辨識中';btn.disabled=true;
  try{
    const wk=await Tesseract.createWorker('eng');
    const{data:{text}}=await wk.recognize(file);
    await wk.terminate();
    const newStocks=[];
    let matched=0;
    text.split('\n').forEach(line=>{
      const m=line.match(/\b([A-Z]{2,6})\b.*?([\d,.]+)/);
      if(!m)return;
      const ticker=m[1],price=parseFloat(m[2].replace(/,/g,''));
      if(!price||isNaN(price))return;
      let s=stocks.find(x=>x.ticker===ticker);
      if(s){s.price=price;saveToDB(s);matched++;}
      else{
        const ns=mkStock(ticker,ticker,'未分類');
        ns.price=price;
        ns.updated=new Date().toLocaleString('zh-TW',{hour12:false});
        stocks.push(ns);saveToDB(ns);
        newStocks.push(ns);matched++;
      }
    });
    render();
    toast(matched?`📸 OCR 識別 ${matched} 筆`:'📸 OCR 未識別到代號');
    // I. 自動更新新增的 OCR 股票，補全名稱和分類
    if(apiKey&&newStocks.length){
      for(const s of newStocks){
        await updateStock(s);render();
      }
    }
  }catch{toast('❌ OCR 失敗，請重試');}
  btn.innerText='📸 OCR';btn.disabled=false;event.target.value='';
};

/* ════════════════════════════════════════
   O. 搜尋
════════════════════════════════════════ */
document.getElementById('srch').addEventListener('input',e=>{
  const q=e.target.value.toUpperCase().trim();
  render(q?stocks.filter(s=>
    s.ticker.includes(q)||
    (s.name||'').toUpperCase().includes(q)||
    (s.category||'').toUpperCase().includes(q)
  ):null);
});

/* ════════════════════════════════════════
   K. 渲染按鈕輔助
════════════════════════════════════════ */
function mkBtn(label,bg,oc){
  return`<button onclick="${oc}" style="background:${bg};color:white;font-size:10px;padding:3px 7px;border-radius:4px;">${label}</button>`;
}
function mkMuted(txt){return`<span style="font-size:10px;color:#6b7280;">${txt}</span>`;}
function mkSpin(){return`<span style="font-size:10px;color:#6b7280;display:flex;align-items:center;gap:3px;"><span class="spin"></span>讀取中</span>`;}

function newsBtn(s){
  const t=s.ticker;
  if(!s.news||s.news==='')                       return mkBtn('載入','#1d4ed8',`handleNewsClick('${t}')`);
  if(s.news==='loading')                          return mkSpin();
  if(s.news==='loaded'&&s.newsItems?.length>0)   return mkBtn(`新聞(${s.newsItems.length})`,'#15803d',`showDetail('${t}','news')`);
  if(s.news==='無近期新聞')                       return mkMuted('無新聞');
  return mkMuted(s.news);  // 需API / 載入失敗
}
function finBtn(s){
  const t=s.ticker;
  if(!s.financials||s.financials==='')           return mkBtn('載入','#1d4ed8',`handleFinClick('${t}')`);
  if(s.financials==='loading')                   return mkSpin();
  if(s.financials==='loaded')                    return mkBtn('財報','#15803d',`showDetail('${t}','financials')`);
  return mkMuted(s.financials);
}

/* ════════════════════════════════════════
   渲染主表格
════════════════════════════════════════ */
function render(list){
  const src=list||stocks;
  const sorted=[...src].sort((a,b)=>
    (a.category||'未分類').localeCompare(b.category||'未分類','zh-Hant')||
    a.ticker.localeCompare(b.ticker)
  );
  const container=document.getElementById('dataRows');
  container.innerHTML='';

  sorted.forEach(s=>{
    const cv=parseFloat(s.change||0);
    const cls=cv>0?'up':(cv<0?'dn':'flat');
    const nm=(s.name||s.ticker).substring(0,20)+((s.name||'').length>20?'…':'');
    // 名稱是否尚未取得正式名稱（仍等於代號）
    const nameIsTemp=(s.name||'')===s.ticker;
    const catOk=s.category&&s.category!=='未分類';

    let tHtml;
    if((s.updated||'-').startsWith('⚠️')){
      tHtml=`<button onclick="showFailTime('${s.ticker}')" style="background:#78350f;color:#fde68a;font-size:9px;padding:2px 6px;border-radius:3px;">⚠️ 失敗</button>`;
    }else{
      tHtml=`<span style="font-size:9px;color:#6b7280;">${s.updated||'-'}</span>`;
    }

    const row=document.createElement('div');
    row.className='row';
    row.innerHTML=`
      <div class="col-tk w-tk" style="color:#34d399;font-weight:700;">${s.ticker}</div>
      <div class="w-nm" title="${(s.name||'').replace(/"/g,'&quot;')}"
           style="${nameIsTemp?'color:#fb923c;font-style:italic;':''}">${nm}</div>
      <div class="w-ct" style="${catOk?'':'color:#f87171;'}">${s.category||'未分類'}</div>
      <div class="w-pr ${cls}" style="font-weight:700;">${f2(s.price)}</div>
      <div class="w-ch ${cls}" style="font-weight:700;">${cv>0?'+':''}${Math.abs(cv).toFixed(2)}%</div>
      <div class="w-oc">${f2(s.open)}</div>
      <div class="w-oc">${f2(s.high)}</div>
      <div class="w-oc">${f2(s.low)}</div>
      <div class="w-vl">${fVol(s.volume)}</div>
      <div class="w-tm">${tHtml}</div>
      <div class="w-nw">${newsBtn(s)}</div>
      <div class="w-fn">${finBtn(s)}</div>
      <div class="w-ac">
        <button onclick="updateOne('${s.ticker}')"
          style="background:#059669;color:black;font-size:10px;padding:3px 6px;border-radius:4px;font-weight:700;">更新</button>
        <button onclick="showChart('${s.ticker}')"
          style="background:#3f3f46;color:white;font-size:10px;padding:3px 6px;border-radius:4px;">圖表</button>
        <button onclick="deleteStock('${s.ticker}')"
          style="background:#7f1d1d;color:#fca5a5;font-size:10px;padding:3px 6px;border-radius:4px;">刪除</button>
      </div>`;
    container.appendChild(row);
  });
}

/* 暴露全域 */
window.updateAll=updateAll;
window.render   =render;

})();
</script>
