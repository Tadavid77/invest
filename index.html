<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投資大師 PRO AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
background:#0b0f14;
color:#e6edf3;
font-size:12px;
}

/* 橫向滑動 */
.table-wrap {
overflow-x:auto;
}

/* 列 */
.row {
display:flex;
min-width:900px;
border-bottom:1px solid #1f2937;
}

/* 欄位 */
.cell {
padding:4px 6px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* 壓縮欄位 */
.ticker { min-width:60px; font-weight:bold; }
.name { min-width:90px; }
.cat { min-width:70px; }
.price { min-width:80px; }
.change { min-width:80px; }
.time { min-width:110px; font-size:10px; color:#888; }

/* 凍結 */
.sticky {
position:sticky;
left:0;
background:#020617;
z-index:10;
border-right:1px solid #333;
}

/* 顏色 */
.up { color:#22c55e; }
.down { color:#ef4444; }

.bg-up { background:rgba(34,197,94,0.08); }
.bg-down { background:rgba(239,68,68,0.08); }

/* header */
.header-row {
background:#020617;
font-weight:bold;
}

/* 卡片 */
.card {
background:#020617;
border:1px solid #1f2937;
border-radius:8px;
padding:10px;
}

</style>
</head>

<body>

<header class="p-2">
<h1 class="text-emerald-400 text-lg">投資大師 PRO AI</h1>

<div class="flex gap-1 mt-1 flex-wrap">
<button onclick="updateAll()" class="bg-yellow-500 px-2 py-1 rounded">更新</button>
<button onclick="exportCSV()" class="bg-green-500 px-2 py-1 rounded">匯出</button>
</div>

<input id="search" class="w-full mt-1 p-1 bg-gray-900 text-sm" placeholder="搜尋">
</header>

<div class="table-wrap">

<div class="row header-row">
<div class="cell ticker sticky">代號</div>
<div class="cell name">名稱</div>
<div class="cell cat">分類</div>
<div class="cell price">價</div>
<div class="cell change">%</div>
<div class="cell time">更新</div>
<div class="cell">操作</div>
</div>

<div id="list"></div>

</div>

<!-- Chart -->
<div id="chartModal" style="display:none; position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;">
<div class="card" style="margin:10% auto; max-width:90%;">
<canvas id="chart"></canvas>
</div>
</div>

<script>

// ===== IndexedDB =====
let db;

const req = indexedDB.open("stockDB",1);

req.onupgradeneeded = e=>{
db = e.target.result;
db.createObjectStore("stocks",{keyPath:"ticker"});
};

req.onsuccess = e=>{
db = e.target.result;
loadStocks();
};

// ===== DB =====
function saveStock(s){
const tx = db.transaction("stocks","readwrite");
tx.objectStore("stocks").put(s);
}

function loadStocks(){
const tx = db.transaction("stocks","readonly");
const store = tx.objectStore("stocks");
const r = store.getAll();

r.onsuccess = ()=>{
stocks = r.result || [];
render();
};
}

// ===== data =====
let stocks=[];

// ===== API =====
async function fetchPrice(ticker){
try{
let res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=YOUR_API_KEY`);
let d = await res.json();
return {price:d.c, change:d.dp};
}catch{
return {price:(Math.random()*1000).toFixed(2), change:(Math.random()*10-5).toFixed(2)};
}
}

// ===== 更新 =====
async function updateOne(s){
let d = await fetchPrice(s.ticker);
s.price = d.price;
s.change = d.change;
s.updated = new Date().toLocaleTimeString();
saveStock(s);
render();
}

async function updateAll(){
for(let s of stocks){
await updateOne(s);
}
}

// ===== UI =====
function render(data=stocks){

if(data.length===0){
document.getElementById("list").innerHTML =
'<div style="padding:10px;color:#888;text-align:center;">查無資料</div>';
return;
}

let html="";

data.forEach(s=>{
html+=`
<div class="row ${s.change>=0?'bg-up':'bg-down'}">

<div class="cell ticker sticky">${s.ticker}</div>
<div class="cell name">${s.name||"-"}</div>
<div class="cell cat">${s.category||"-"}</div>

<div class="cell price ${s.change>=0?'up':'down'}">${s.price||"-"}</div>
<div class="cell change ${s.change>=0?'up':'down'}">${s.change||0}%</div>

<div class="cell time">${s.updated||"-"}</div>

<div class="cell">
<button onclick="updateOne(stocks.find(x=>x.ticker=='${s.ticker}'))">更</button>
<button onclick="showChart('${s.ticker}')">圖</button>
</div>

</div>
`;
});

document.getElementById("list").innerHTML = html;
}

// ===== Chart =====
function showChart(){

let ctx = document.getElementById("chart").getContext("2d");

new Chart(ctx,{
type:'line',
data:{
labels:[1,2,3,4,5],
datasets:[{data:[10,20,15,30,25]}]
}
});

document.getElementById("chartModal").style.display="block";
}

// ===== CSV =====
function exportCSV(){
let csv="ticker,price\n";
stocks.forEach(s=>{
csv+=`${s.ticker},${s.price}\n`;
});
let blob=new Blob(["\uFEFF"+csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="stocks.csv";
a.click();
}

// ===== 搜尋 =====
document.getElementById("search").addEventListener("input",e=>{
let t=e.target.value.toUpperCase();
render(stocks.filter(s=>s.ticker.includes(t)));
});

</script>

</body>
</html>
