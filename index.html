<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="投資大師">
  <meta name="theme-color" content="#34d399">
  <meta name="description" content="專業美股＋台股投資追蹤工具 — CFP專業版">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>投資大師 Pro MAX v13.1</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>

  <style>
    :root{
      --safe-top:env(safe-area-inset-top);
      --safe-bot:env(safe-area-inset-bottom);
      --bg:#0b0f14; --sf:#111827; --sf2:#18181b;
      --bd:#1f2937; --bd2:#374151;
      --tx:#e6edf3; --mt:#9ca3af;
      --gr:#34d399; --rd:#ff4d4f; --bl:#3b82f6;
      --row-h:50px; --fs-cell:13px; --fs-hdr:12px;
    }
    *{box-sizing:border-box;}
    body{
      background:var(--bg);color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
      margin:0;padding:0;height:100vh;height:-webkit-fill-available;
      display:flex;flex-direction:column;overflow:hidden;
      padding-top:var(--safe-top);padding-bottom:var(--safe-bot);
    }

    /* ══ 系統條 ══ */
    #offBar{display:none;background:#7c3aed;color:white;text-align:center;font-size:11px;font-weight:600;padding:4px;flex-shrink:0;}
    #instBar{display:none;background:#1e3a5f;color:white;padding:8px 14px;font-size:11px;font-weight:600;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #2563eb;}
    #instBar button{background:var(--bl);color:white;font-size:11px;padding:4px 12px;border-radius:6px;font-weight:700;}

    /* ══ 頭部 ══ */
    header{flex-shrink:0;background:var(--sf2);border-bottom:1px solid var(--bd);padding:8px 12px;z-index:50;}
    .hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
    .hdr-top h1{font-size:1.1rem;font-weight:700;color:var(--gr);margin:0;}
    .hdr-btns{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
    .hdr-btns button{font-size:11px;padding:5px 10px;border-radius:6px;font-weight:600;white-space:nowrap;}
    .api-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;}
    .api-row input{flex:1;background:var(--bg);border:1px solid var(--bd2);padding:5px 8px;border-radius:6px;color:white;font-size:11px;}
    .add-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
    .add-row input{background:var(--sf);border:1px solid var(--bd2);padding:5px 8px;border-radius:6px;color:white;font-size:11px;}
    .st-txt{font-size:10px;color:var(--mt);}

    /* ══ 市場切換頁籤 ══ */
    .market-tabs{
      display:flex;gap:0;background:var(--bg);
      border-bottom:2px solid var(--bd2);flex-shrink:0;
    }
    .tab-btn{
      flex:1;padding:10px 0;font-size:14px;font-weight:700;
      border:none;cursor:pointer;transition:all .2s;
      background:transparent;color:var(--mt);
      border-bottom:3px solid transparent;margin-bottom:-2px;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .tab-btn.active-us{
      color:#60a5fa;border-bottom-color:#3b82f6;
      background:linear-gradient(180deg,rgba(59,130,246,.08) 0%,transparent 100%);
    }
    .tab-btn.active-tw{
      color:#f87171;border-bottom-color:#ef4444;
      background:linear-gradient(180deg,rgba(239,68,68,.08) 0%,transparent 100%);
    }
    .tab-count{
      font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;
      min-width:20px;text-align:center;
    }
    .tab-btn.active-us .tab-count{background:#1e3a5f;color:#93c5fd;}
    .tab-btn.active-tw .tab-count{background:#450a0a;color:#fca5a5;}
    .tab-btn:not(.active-us):not(.active-tw) .tab-count{background:#1f2937;color:#6b7280;}

    /* 追蹤總數徽章 */
    #stockCount{
      display:inline-flex;align-items:center;gap:4px;
      background:#1e3a5f;border:1px solid #2563eb;
      border-radius:20px;padding:3px 10px;
      font-size:11px;font-weight:700;color:#93c5fd;white-space:nowrap;
    }
    #stockCount span{color:#34d399;font-size:13px;}

    /* ══ 表格 ══ */
    .tbl-wrap{flex:1;overflow:auto;background:var(--bg);-webkit-overflow-scrolling:touch;}
    .tbl-scroll{min-width:1294px;display:flex;flex-direction:column;}
    .row{display:flex;min-height:var(--row-h);align-items:stretch;}
    .row>div{
      padding:6px 8px;display:flex;align-items:center;
      border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      font-size:var(--fs-cell);
    }
    .row>div:last-child{border-right:none;}
    .row:hover{background:rgba(255,255,255,.03);}
    .hdr-row{position:sticky;top:0;z-index:30;background:var(--sf);font-weight:700;color:#e5e7eb;}
    .hdr-row>div{background:var(--sf);font-size:var(--fs-hdr);}
    .col-tk{position:sticky;left:0;z-index:20;background:var(--bg);font-weight:700;border-right:2px solid var(--bd2)!important;}
    .hdr-row .col-tk{background:var(--sf);z-index:40;}
    .row:hover .col-tk{background:#0f1520;}

    /* 欄寬 */
    .w-tk {width:85px;}  .w-nm {width:160px;} .w-ct {width:105px;}
    .w-pr {width:82px;justify-content:flex-end;}
    .w-ch {width:78px;justify-content:flex-end;}
    .w-oc {width:78px;justify-content:flex-end;}
    .w-vl {width:100px;justify-content:flex-end;}
    .w-tm {width:118px;justify-content:center;}
    .w-nw {width:80px;justify-content:center;}
    .w-fn {width:80px;justify-content:center;}
    .w-ch2{width:72px;justify-content:center;}
    .w-ac {width:100px;justify-content:center;gap:6px;border-right:none;}

    /* 漲跌色 */
    .up  {color:var(--rd);}  .dn{color:#22c55e;}  .flat{color:var(--mt);}
    .vol-up{color:var(--rd);font-weight:600;}
    .vol-dn{color:#22c55e;font-weight:600;}
    .vol-flat{color:var(--mt);}

    button{transition:all .15s;font-weight:600;border-radius:5px;cursor:pointer;border:none;}
    button:active{transform:scale(.93);opacity:.85;}
    .prog-bar{height:3px;background:#1e293b;border-radius:10px;margin:3px 0;}
    .prog-fill{height:3px;background:var(--bl);border-radius:10px;width:0%;transition:width .25s;}

    /* ══ Modal ══ */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
    .mbox{background:#0f172a;padding:22px;border-radius:18px;width:100%;max-width:640px;max-height:84vh;overflow-y:auto;border:1px solid #334155;box-shadow:0 25px 60px rgba(0,0,0,.7);}
    .mclose{width:100%;margin-top:18px;background:#1e293b;padding:11px;border-radius:12px;font-weight:700;font-size:13px;color:var(--tx);}
    .news-card{background:#1e293b;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.6;color:#cbd5e1;border-left:3px solid var(--bl);}
    .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 16px;background:#1e293b;border-radius:8px;padding:12px;border-left:3px solid var(--gr);}
    .fin-lbl{font-size:10px;color:#6b7280;} .fin-val{font-size:12px;font-weight:600;color:#e2e8f0;text-align:right;}

    /* ══ Toast ══ */
    #toast{
      position:fixed;bottom:calc(24px + var(--safe-bot));
      left:50%;transform:translateX(-50%) translateY(20px);
      background:#1e293b;color:white;padding:10px 22px;
      border-radius:50px;font-size:12px;font-weight:600;
      border:1px solid #334155;z-index:300;
      opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:sp .7s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}
    .rbtn{background:#1e293b;color:#9ca3af;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid #334155;}
    .rbtn.act{background:var(--bl)!important;color:white!important;border-color:#2563eb!important;}

    /* ══ 台股代號提示 ══ */
    .tw-hint{font-size:9px;color:#6b7280;margin-top:1px;}
  </style>

</head>
<body>

<div id="offBar">⚡ 離線模式 — 顯示本機快取資料</div>
<div id="instBar">
  <span>📱 加入主畫面，享受 App 體驗</span>
  <div style="display:flex;gap:6px;">
    <button id="instBtn">立即安裝</button>
    <button onclick="document.getElementById('instBar').style.display='none'" style="background:#334155;color:#9ca3af;">✕</button>
  </div>
</div>

<!-- ════ 頭部 ════ -->

<header>
  <div class="hdr-top">
    <div style="display:flex;flex-direction:column;gap:2px;">
      <h1>📈 投資大師 Pro MAX <span style="font-size:10px;font-weight:400;color:#52525b;">v13.1</span></h1>
      <span id="apiSt" class="st-txt">⚪ 未設定 API Key</span>
    </div>
    <div class="hdr-btns">
      <div id="stockCount">📊 追蹤 <span id="cntNum">0</span> 檔</div>
      <button onclick="updateAll()" style="background:#2563eb;color:white;">🔄 全部更新</button>
      <button onclick="focusAdd()"  style="background:#4f46e5;color:white;">＋ 新增</button>
      <button onclick="exportCSV()" style="background:#27272a;color:#d4d4d8;border:1px solid #3f3f46;">📤 匯出</button>
      <button onclick="document.getElementById('csvInp').click()" style="background:#27272a;color:#d4d4d8;border:1px solid #3f3f46;">📥 匯入</button>
      <button id="ocrBtn" onclick="document.getElementById('imgInp').click()" style="background:#059669;color:black;">📸 OCR</button>
    </div>
  </div>

  <div class="api-row">
    <input id="apiKey" type="password" placeholder="Finnhub API Key（美股必填）" autocomplete="off">
    <button onclick="saveKey()" style="background:#3f3f46;color:white;font-size:11px;padding:5px 10px;border-radius:6px;">儲存</button>
  </div>

  <div class="add-row">
    <input id="newTk" placeholder="代號" style="width:80px;font-weight:700;color:#34d399;text-transform:uppercase;" onkeydown="if(event.key==='Enter')manualAdd()">
    <input id="newNm" placeholder="名稱（選填）" style="width:110px;" onkeydown="if(event.key==='Enter')manualAdd()">
    <input id="newCt" placeholder="分類（留空自動取得）" style="width:120px;" onkeydown="if(event.key==='Enter')manualAdd()">
    <button onclick="manualAdd()" style="background:#10b981;color:black;font-size:11px;padding:5px 10px;border-radius:6px;font-weight:700;">＋ 新增</button>
    <input id="srch" placeholder="🔍 搜尋代號 / 名稱 / 分類..." style="flex:1;min-width:100px;">
    <div id="progWrap" class="hidden" style="flex:1;min-width:130px;">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-bottom:2px;">
        <span>更新中...</span><span id="progCt">0/0</span>
      </div>
      <div class="prog-bar"><div id="progFill" class="prog-fill"></div></div>
    </div>
  </div>
</header>

<!-- ════ 市場切換頁籤 ════ -->

<div class="market-tabs">
  <button id="tabUS" class="tab-btn active-us" onclick="switchMarket('US')">
    🇺🇸 美股
    <span class="tab-count" id="cntUS">0</span>
  </button>
  <button id="tabTW" class="tab-btn" onclick="switchMarket('TW')">
    🇹🇼 台股
    <span class="tab-count" id="cntTW">0</span>
  </button>
</div>

<input type="file" id="imgInp" accept="image/*" multiple class="hidden" onchange="handleOCR(event)">
<input type="file" id="csvInp" accept=".csv,.txt" class="hidden" onchange="importCSV(event)">

<!-- ════ 主表格 ════ -->

<div class="tbl-wrap">
  <div class="tbl-scroll">
    <div class="row hdr-row">
      <div class="col-tk w-tk">代號</div>
      <div class="w-nm">名稱</div>
      <div class="w-ct">分類</div>
      <div class="w-pr">成交</div>
      <div class="w-ch">漲跌%</div>
      <div class="w-oc">開盤</div>
      <div class="w-oc">最高</div>
      <div class="w-oc">最低</div>
      <div class="w-vl">成交量</div>
      <div class="w-tm">更新時間</div>
      <div class="w-nw">新聞</div>
      <div class="w-fn">財報</div>
      <div class="w-ch2">線圖</div>
      <div class="w-ac">操作</div>
    </div>
    <div id="dataRows" style="display:contents;"></div>
  </div>
</div>

<!-- ════ Modal：新聞 / 財報 ════ -->

<div id="modal" class="modal" onclick="closeModal('modal')">
  <div class="mbox" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h3 id="mTitle" style="font-size:15px;font-weight:700;color:#34d399;margin:0;"></h3>
      <span id="mTk" style="font-size:11px;color:#6b7280;"></span>
    </div>
    <div id="mBody"></div>
    <button onclick="closeModal('modal')" class="mclose">關閉</button>
  </div>
</div>

<!-- ════ Modal：K線圖 ════ -->

<div id="chartModal" class="modal" onclick="closeModal('chartModal')">
  <div class="mbox" style="max-width:960px;" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <h3 id="chartTit" style="font-size:16px;font-weight:700;color:#34d399;margin:0;">線圖</h3>
      <div style="display:flex;gap:5px;align-items:center;">
        <span style="font-size:10px;color:#6b7280;">區間：</span>
        <button id="r7"   onclick="changeRange(7)"   class="rbtn">7天</button>
        <button id="r30"  onclick="changeRange(30)"  class="rbtn act">30天</button>
        <button id="r90"  onclick="changeRange(90)"  class="rbtn">90天</button>
        <button id="r180" onclick="changeRange(180)" class="rbtn">半年</button>
        <button id="r365" onclick="changeRange(365)" class="rbtn">1年</button>
        <button onclick="closeModal('chartModal')" style="background:#1e293b;color:white;padding:4px 10px;border-radius:6px;font-size:11px;margin-left:6px;">✕</button>
      </div>
    </div>
    <canvas id="chartCvs" style="width:100%;max-height:420px;"></canvas>
  </div>
</div>

<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     投資大師 Pro MAX  v13.0
     架構重大升級：美股（US）＋台股（TW）雙市場頁籤
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     資料架構：
       stocks = { US: [...], TW: [...] }  完全隔離
       IndexedDB: stockDB_v3
         - objectStore 'stocks_us'  美股
         - objectStore 'stocks_tw'  台股

     市場切換：
       curMarket = 'US' | 'TW'
       switchMarket(m) 切換頁籤，render 只顯示當前市場

     API 差異：
       美股 → Finnhub  /quote  /stock/profile2  /company-news
       台股 → TWSE 臺灣證交所 open data API（免費，無需 API Key）
              行情: https://mis.twse.com.tw/stock/api/getStockInfo.jsp
              基本資料: https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL

     台股功能完整對應美股：
       ✅ 即時報價（成交/開盤/最高/最低/成交量/漲跌%）
       ✅ 公司名稱 + 產業分類（TWSE 行業別）
       ✅ 新聞（Yahoo Finance RSS 台股新聞）
       ✅ K線圖（TWSE 日K資料）
       ✅ 全部更新 / 個別更新
       ✅ 新增 / 刪除 / 匯入 / 匯出 / OCR
       ✅ 分類、成交量、開盤/最高/最低顏色
══════════════════════════════════════════════════════════ -->

<script>
(function(){
'use strict';

/* ══════════════════════
   全域狀態
══════════════════════ */
let db = null;
let stocks = { US:[], TW:[] };   // 雙市場完全隔離
let curMarket = 'US';             // 目前顯示的市場
let chartInst = null;
let curTicker = null, curDays = 30;
let apiKey = localStorage.getItem('FINNHUB_KEY') || '';
let deferPWA = null;
const volCache = {};  // { 'US:AAPL': 12345, 'TW:2330': 67890 }

if(apiKey) document.getElementById('apiKey').value = apiKey;

/* ══════════════════════
   工具函式
══════════════════════ */
const isNum  = s => /^\d+(\.\d+)?$/.test((s||'').toString().trim());
const isGood = v => typeof v === 'number' && isFinite(v) && v > 0;
const f2     = v => parseFloat(v||0).toFixed(2);
const fVol   = v => {
  const n = Number(v);
  if(!n||isNaN(n)) return '-';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
};
/* 台股成交量（張 → 千股，TWSE 單位是張） */
const fVolTW = v => {
  const n = Number(v);
  if(!n||isNaN(n)) return '-';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M張';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K張';
  return n+'張';
};

/* ══════════════════════
   Toast
══════════════════════ */
let toastTmr = null;
function toast(msg, ms=2800){
  const el = document.getElementById('toast');
  el.innerText = msg; el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(()=>el.classList.remove('show'), ms);
}

/* ══════════════════════
   PWA
══════════════════════ */
if('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferPWA = e;
  document.getElementById('instBar').style.display = 'flex';
});
document.getElementById('instBtn').addEventListener('click', async()=>{
  if(!deferPWA) return;
  deferPWA.prompt();
  const r = await deferPWA.userChoice;
  deferPWA = null;
  document.getElementById('instBar').style.display = 'none';
  if(r.outcome==='accepted') toast('✅ 已加入主畫面！');
});
window.addEventListener('appinstalled', ()=>toast('🎉 App 安裝成功！'));
const chkOnline = ()=>{ document.getElementById('offBar').style.display = navigator.onLine?'none':'block'; };
window.addEventListener('online', chkOnline); window.addEventListener('offline', chkOnline); chkOnline();

/* ══════════════════════
   API Key UI
══════════════════════ */
function updateApiUI(){
  const el = document.getElementById('apiSt');
  if(apiKey){ el.style.color='#34d399'; el.innerText='🟢 Finnhub Key 已設定（美股）'; }
  else       { el.style.color='#9ca3af'; el.innerText='⚪ 未設定 Finnhub Key（台股可免費使用）'; }
}
updateApiUI();
window.saveKey = ()=>{
  const k = document.getElementById('apiKey').value.trim();
  if(!k){ toast('⚠️ API Key 不能為空'); return; }
  apiKey = k; localStorage.setItem('FINNHUB_KEY', k);
  updateApiUI(); toast('✅ Finnhub API Key 已儲存');
};

/* ══════════════════════
   垃圾值清單
══════════════════════ */
const JUNK_NM = new Set(['OCR','CSV','OCR掃描','掃描新增','新掃描','未知','未命名','undefined','null','']);
const JUNK_CT = new Set([
  'OCR','CSV','OCR掃描','掃描新增','CSV匯入','新掃描',
  '未分類','未知','未命名','其他','Other','N/A','NA','undefined','null','',
]);

/* ══════════════════════
   IndexedDB v3（雙 store）
══════════════════════ */
const dbReq = indexedDB.open('stockDB_v3', 1);
dbReq.onupgradeneeded = e => {
  db = e.target.result;
  if(!db.objectStoreNames.contains('stocks_us'))
    db.createObjectStore('stocks_us', { keyPath:'ticker' });
  if(!db.objectStoreNames.contains('stocks_tw'))
    db.createObjectStore('stocks_tw', { keyPath:'ticker' });
};
dbReq.onsuccess = e => { db = e.target.result; loadDB(); };
dbReq.onerror   = () => { console.warn('IndexedDB 不可用'); render(); };

/* 建立空白股票 */
function mkStock(ticker, name, cat, market){
  return {
    ticker, name: name||ticker, category: cat||'',
    market: market||curMarket,
    price:0, change:0, open:0, high:0, low:0, volume:0,
    prevClose:0, prevVol:0,
    updated:'-', news:'', newsItems:[], financials:'', finData:{},
    history:{news:[],fin:[],adv:[]},
    userCat:false, needUpdate:true
  };
}

/* sanitize */
function sanitize(s, market){
  if(!s.history)    s.history   = {news:[],fin:[],adv:[]};
  if(!s.newsItems)  s.newsItems = [];
  if(!s.finData)    s.finData   = {};
  if(s.userCat===undefined)   s.userCat   = false;
  if(s.prevClose===undefined) s.prevClose = 0;
  if(s.prevVol===undefined)   s.prevVol   = 0;
  if(!s.market) s.market = market;

  const nm = (s.name||'').trim();
  if(!nm || JUNK_NM.has(nm) || isNum(nm) || nm===s.ticker){
    s.name = s.ticker; s.needUpdate = true;
  }
  const ct = (s.category||'').trim();
  if(!ct || JUNK_CT.has(ct) || isNum(ct)){
    s.category = ''; s.userCat = false; s.needUpdate = true;
  }
  if(!isGood(Number(s.price))) s.price = 0;
  return s;
}

/* DB 操作 */
function storeName(market){ return market==='TW' ? 'stocks_tw' : 'stocks_us'; }
function saveToDB(s){
  if(!db) return;
  db.transaction(storeName(s.market||curMarket),'readwrite')
    .objectStore(storeName(s.market||curMarket)).put(s);
}
function delFromDB(ticker, market){
  if(!db) return;
  db.transaction(storeName(market),'readwrite')
    .objectStore(storeName(market)).delete(ticker);
}

/* 載入 DB */
function loadDB(){
  if(!db) return;
  let loaded = 0;
  const done = ()=>{
    loaded++;
    if(loaded < 2) return;
    // 兩個市場都載入完再更新
    updateTabCounts();
    render();
    if(apiKey || true) setTimeout(updateAll, 700); // 台股不需要 apiKey
  };

  ['US','TW'].forEach(m=>{
    const sn = storeName(m);
    const req = db.transaction(sn,'readonly').objectStore(sn).getAll();
    req.onsuccess = ()=>{
      stocks[m] = (req.result||[]).map(s=>sanitize(s,m));
      if(!stocks[m].length && m==='US'){
        const seed = mkStock('AAPL','Apple Inc.','科技','US');
        seed.needUpdate = false; stocks['US'].push(seed); saveToDB(seed);
      }
      if(!stocks[m].length && m==='TW'){
        const seed = mkStock('2330','台積電','半導體','TW');
        seed.needUpdate = false; stocks['TW'].push(seed); saveToDB(seed);
      }
      done();
    };
    req.onerror = ()=>done();
  });
}

══════════════════════ */
async function callFinnhub(path, params={}){
  if(!apiKey) throw new Error('NO_KEY');
  const url = new URL(`https://finnhub.io/api/v1${path}`);
  url.searchParams.set('token', apiKey);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchUSQuote(ticker){
  try{
    const d = await callFinnhub('/quote', { symbol: ticker });
    const c = Number(d.c); if(!isGood(c)) return null;
    const o=Number(d.o), h=Number(d.h), l=Number(d.l), pc=Number(d.pc), v=Number(d.v);
    const cacheKey = 'US:'+ticker;
    let vol=0, prevVol=0;
    if(v>0){ prevVol=volCache[cacheKey]||0; vol=v; volCache[cacheKey]=v; }
    else if(volCache[cacheKey]>0){ vol=volCache[cacheKey]; }
    return{ price:c, change:Number(d.dp)||0, open:isGood(o)?o:0, high:isGood(h)?h:0,
            low:isGood(l)?l:0, volume:vol, prevVol, prevClose:isGood(pc)?pc:0 };
  }catch{ return null; }
}

async function fetchUSProfile(ticker){
  try{
    const d = await callFinnhub('/stock/profile2', { symbol: ticker });
    if(!d||Object.keys(d).length===0||!d.name) return null;
    return { name:(d.name||'').trim(), industry:(d.finnhubIndustry||'').trim() };
  }catch{ return null; }
}

/* 台股即時行情（TWSE mis api，免費無需 key） */
async function fetchTWQuote(ticker){
  try{
    // TWSE 上市：代號+.TW，上櫃：代號+.TWO
    // 先嘗試上市
    const sym = ticker.includes('.') ? ticker : `${ticker}.TW`;
    const url  = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${ticker}.tw&json=1&delay=0`;
    const res  = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const msgArray = data?.msgArray;
    if(!msgArray?.length) return await fetchTWQuoteOTC(ticker);

    const d = msgArray[0];
    // TWSE 欄位：z=最新成交, o=開盤, h=最高, l=最低, y=昨收, v=成交量(張)
    const c  = parseFloat(d.z); if(!isGood(c)) return null;
    const o  = parseFloat(d.o), h = parseFloat(d.h), lo = parseFloat(d.l);
    const pc = parseFloat(d.y);  // 昨收
    const v  = parseFloat(d.v);  // 成交量(張)
    const chg = pc>0 ? ((c-pc)/pc*100) : 0;

    const cacheKey = 'TW:'+ticker;
    let vol=0, prevVol=0;
    if(v>0){ prevVol=volCache[cacheKey]||0; vol=v; volCache[cacheKey]=v; }
    else if(volCache[cacheKey]>0){ vol=volCache[cacheKey]; }

    return{ price:c, change:parseFloat(chg.toFixed(2)),
            open:isGood(o)?o:0, high:isGood(h)?h:0, low:isGood(lo)?lo:0,
            volume:vol, prevVol, prevClose:isGood(pc)?pc:0 };
  }catch{ return await fetchTWQuoteOTC(ticker); }
}

/* 上櫃（OTC/TPEX） */
async function fetchTWQuoteOTC(ticker){
  try{
    const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=otc_${ticker}.tw&json=1&delay=0`;
    const res  = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const d = data?.msgArray?.[0];
    if(!d) return null;
    const c  = parseFloat(d.z); if(!isGood(c)) return null;
    const o  = parseFloat(d.o), h = parseFloat(d.h), lo = parseFloat(d.l);
    const pc = parseFloat(d.y), v  = parseFloat(d.v);
    const chg = pc>0 ? ((c-pc)/pc*100) : 0;
    const cacheKey = 'TW:'+ticker;
    let vol=0, prevVol=0;
    if(v>0){ prevVol=volCache[cacheKey]||0; vol=v; volCache[cacheKey]=v; }
    else if(volCache[cacheKey]>0){ vol=volCache[cacheKey]; }
    return{ price:c, change:parseFloat(chg.toFixed(2)),
            open:isGood(o)?o:0, high:isGood(h)?h:0, low:isGood(lo)?lo:0,
            volume:vol, prevVol, prevClose:isGood(pc)?pc:0 };
  }catch{ return null; }
}

async function fetchTWProfile(ticker){
  try{
    // 嘗試從 TWSE 公開資料取公司名稱和產業
    const url = `https://openapi.twse.com.tw/v1/opendata/t187ap03_L`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if(!res.ok) throw new Error();
    const data = await res.json();
    const item = data.find(x => x['公司代號'] === ticker || x['股票代號'] === ticker);
    if(item){
      return{
        name    : item['公司簡稱'] || item['公司名稱'] || ticker,
        industry: item['產業類別'] || item['行業別'] || ''
      };
    }
  }catch{}

  // 備援：從上市公司基本資料抓
  try{
    const url2 = `https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_d?stockNo=${ticker}`;
    const res2 = await fetch(url2, { signal: AbortSignal.timeout(8000) });
    if(res2.ok){
      const d2 = await res2.json();
      if(d2?.length){ return{ name: d2[0]['名稱']||ticker, industry: d2[0]['產業別']||'' }; }
    }
  }catch{}

  // 再備援：從上櫃公司資料抓
  try{
    const url3 = `https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes`;
    const res3 = await fetch(url3, { signal: AbortSignal.timeout(8000) });
    if(res3.ok){
      const d3 = await res3.json();
      const item = d3.find(x=>x['SecuritiesCompanyCode']===ticker||x['CompanyCode']===ticker);
      if(item){ return{ name:item['CompanyAbbreviation']||item['CompanyName']||ticker, industry:item['IndustryType']||'' }; }
    }
  }catch{}

  return null;
}

/* ══════════════════════
   統一更新函式
══════════════════════ */
async function updateStock(s){
  const isTW = s.market === 'TW';

  /* Step1: 報價 */
  const q = isTW ? await fetchTWQuote(s.ticker) : await fetchUSQuote(s.ticker);
  if(q){
    s.price  = q.price; s.change = q.change;
    if(q.open >0) s.open  = q.open;
    if(q.high >0) s.high  = q.high;
    if(q.low  >0) s.low   = q.low;
    if(q.volume>0) s.volume = q.volume;
    if(q.prevClose>0) s.prevClose = q.prevClose;
    if(q.prevVol  >0) s.prevVol   = q.prevVol;
    s.updated = new Date().toLocaleString('zh-TW',{hour12:false});
  }else{
    s.updated = '⚠️ 更新失敗';
  }

  /* Step2: 公司資料（名稱＋分類） */
  const p = isTW ? await fetchTWProfile(s.ticker) : await fetchUSProfile(s.ticker);
  if(p){
    if(p.name) s.name = p.name;
    const hasRealUserCat = s.userCat===true && s.category &&
      s.category.trim()!=='' && !JUNK_CT.has(s.category.trim());
    if(!hasRealUserCat){
      const zh = isTW ? (p.industry||'') : toZhCatUS(p.industry);
      s.category = zh || '未分類';
      s.userCat  = false;
    }
  }else{
    if(!s.name||JUNK_NM.has(s.name)||s.name===s.ticker) s.name = s.ticker;
    if(!s.category||JUNK_CT.has(s.category.trim())) s.category = '未分類';
  }

  s.needUpdate = false;
  saveToDB(s);
}

/* ══════════════════════
   全部更新（只更新當前市場）
══════════════════════ */
async function updateAll(){
  const m = curMarket;
  const list = stocks[m];
  if(!list.length){ toast(`⚠️ ${m==='US'?'美股':'台股'}清單是空的`); return; }
  if(m==='US' && !apiKey){ toast('⚠️ 美股需要設定 Finnhub API Key'); return; }
  if(!navigator.onLine){ toast('📡 離線狀態，無法更新'); return; }

  const wrap  = document.getElementById('progWrap');
  const fill  = document.getElementById('progFill');
  const ctEl  = document.getElementById('progCt');
  wrap.classList.remove('hidden'); fill.style.width='0%';
  let done=0; const total=list.length; ctEl.innerText=`0/${total}`;

  const queue  = [...list];
  const worker = async()=>{
    while(queue.length){
      const s = queue.shift();
      try{ await updateStock(s); }catch(e){ console.warn(s.ticker,e); }
      done++; fill.style.width=(done/total*100)+'%'; ctEl.innerText=`${done}/${total}`;
      render();
    }
  };
  await Promise.allSettled([worker(),worker(),worker()]);
  toast(`✅ ${m==='US'?'美股':'台股'}已更新 ${total} 筆`);
  setTimeout(()=>wrap.classList.add('hidden'),2000);
}
window.updateAll = updateAll;

  if(curMarket==='US'&&!apiKey){ toast('⚠️ 請設定 Finnhub API Key 以取得美股資料'); return; }
  await updateStock(s); render(); toast(`✅ ${s.name||ticker} 完成`);
};

async function loadNews(s){
  const isTW = s.market==='TW';
  if(!isTW && !apiKey){ s.news='需Finnhub Key'; saveToDB(s); render(); return; }
  s.news='loading'; render();
  try{
    if(isTW){
      /* 台股新聞：Yahoo Finance RSS（繞過 CORS 用 allOrigins proxy） */
      const rssUrl = encodeURIComponent(`https://tw.stock.yahoo.com/rss?s=${s.ticker}`);
      const res = await fetch(`https://api.allorigins.win/get?url=${rssUrl}`,
        { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      const xml  = new DOMParser().parseFromString(data.contents||'', 'text/xml');
      const items = [...xml.querySelectorAll('item')].slice(0,6);
      if(items.length){
        s.newsItems = items.map(item=>({
          headline: item.querySelector('title')?.textContent||'',
          source  : '雅虎財經',
          url     : item.querySelector('link')?.textContent||'',
          datetime: Math.floor(new Date(item.querySelector('pubDate')?.textContent||0).getTime()/1000)
        }));
        s.news = 'loaded';
      }else{ s.newsItems=[]; s.news='無近期新聞'; }
    }else{
      /* 美股新聞：Finnhub */
      const from = new Date(Date.now()-7*86400000).toISOString().split('T')[0];
      const to   = new Date().toISOString().split('T')[0];
      const data = await callFinnhub('/company-news',{symbol:s.ticker,from,to});
      if(data?.length){
        s.newsItems = data.slice(0,6).map(n=>({headline:n.headline,source:n.source,url:n.url,datetime:n.datetime}));
        s.news = 'loaded';
      }else{ s.newsItems=[]; s.news='無近期新聞'; }
    }
  }catch{ s.news='載入失敗'; }
  saveToDB(s); render();
}

async function loadFin(s){
  const isTW = s.market==='TW';
  if(!isTW && !apiKey){ s.financials='需Finnhub Key'; saveToDB(s); render(); return; }
  s.financials='loading'; render();
  try{
    if(isTW){
      /* 台股財務指標：TWSE 本益比、殖利率等 */
      const res = await fetch(
        `https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_d?stockNo=${s.ticker}`,
        { signal: AbortSignal.timeout(8000) }
      );
      if(!res.ok) throw new Error();
      const data = await res.json();
      const d = data?.[0] || {};
      s.finData = {
        pe      : parseFloat(d['本益比'])||null,
        divYield: parseFloat(d['殖利率(%)'])||null,
        pbr     : parseFloat(d['股價淨值比'])||null,
        eps     : parseFloat(d['每股盈餘'])||null,
      };
      s.financials = 'loaded';
    }else{

      const r = await callFinnhub('/stock/metric',{symbol:s.ticker,metric:'all'});
      const m = r.metric||{};
      s.finData = {
        pe:m.peBasicExclExtraTTM||m.peTTM||null, eps:m.epsBasicExclExtraAnnual||null,
        roe:m.roeTTM||null, roa:m.roaTTM||null,
        debtEq:m['totalDebt/totalEquityAnnual']||null,
        grossMargin:m.grossMarginTTM||null, netMargin:m.netProfitMarginTTM||null,
        beta:m.beta||null, w52hi:m['52WeekHigh']||null, w52lo:m['52WeekLow']||null,
        divYield:m.dividendYieldIndicatedAnnual||null, mktCap:m.marketCapitalization||null,
      };
      s.financials = 'loaded';
    }
  }catch{ s.financials='載入失敗'; }
  saveToDB(s); render();
}

async function drawChart(ticker, days, market){
  const canvas = document.getElementById('chartCvs');
  const ctx    = canvas.getContext('2d');
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#6b7280'; ctx.font='14px system-ui'; ctx.textAlign='center';
  ctx.fillText('載入中...', canvas.width/2, canvas.height/2);

  try{
    let ohlc=[], vols=[];

    if(market==='TW'){
      /* 台股K線：TWSE 日K資料 */
      const today  = new Date();
      const yyyymm = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}`;
      const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyymm}01&stockNo=${ticker}`;
      const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
      const data = await res.json();
      if(data.stat!=='OK'||!data.data?.length) throw new Error('無台股K線資料');

      // TWSE 格式：日期,成交股數,成交金額,開盤,最高,最低,收盤,漲跌,漲跌幅
      ohlc = data.data.slice(-days).map(row=>{
        const parts = row[0].split('/');
        const d = new Date(parseInt(parts[0])+1911, parseInt(parts[1])-1, parseInt(parts[2]));
        return{ x:d.getTime(), o:parseFloat(row[3].replace(/,/g,'')),
                h:parseFloat(row[4].replace(/,/g,'')), l:parseFloat(row[5].replace(/,/g,'')),
                c:parseFloat(row[6].replace(/,/g,'')) };
      }).filter(d=>isGood(d.c));
      vols = data.data.slice(-days).map((row,i)=>{
        const parts=row[0].split('/');
        const d=new Date(parseInt(parts[0])+1911,parseInt(parts[1])-1,parseInt(parts[2]));
        return{ x:d.getTime(), y:parseInt(row[1].replace(/,/g,''))||0 };
      });
    }else{
      /* 美股K線：Finnhub */
      const to=Math.floor(Date.now()/1000), from=to-days*86400;
      const res=days<=7?'60':'D';
      const data=await callFinnhub('/stock/candle',{symbol:ticker,resolution:res,from,to});
      if(data.s!=='ok'||!data.t?.length) throw new Error('無K線資料');
      ohlc=data.t.map((t,i)=>({x:t*1000,o:data.o[i],h:data.h[i],l:data.l[i],c:data.c[i]}));
      vols=data.t.map((t,i)=>({x:t*1000,y:data.v?.[i]||0}));
    }

    if(!ohlc.length) throw new Error('無資料');
    canvas.style.height='420px';
    chartInst = new Chart(ctx,{
      data:{ datasets:[
        { type:'candlestick', label:ticker, data:ohlc,
          color:{up:'#ff4d4f',down:'#22c55e',unchanged:'#9ca3af'}, yAxisID:'y' },
        { type:'bar', label:'成交量', data:vols, yAxisID:'y2',
          backgroundColor:ohlc.map(d=>d.c>=d.o?'rgba(255,77,79,.35)':'rgba(34,197,94,.35)') }
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, interaction:{mode:'index'},
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>{
          if(c.dataset.type==='candlestick'){const d=c.raw;return[`開:${d.o?.toFixed(2)}  高:${d.h?.toFixed(2)}`,`低:${d.l?.toFixed(2)}  收:${d.c?.toFixed(2)}`];}
          return`量:${market==='TW'?fVolTW(c.raw.y):fVol(c.raw.y)}`;
        }}}},
        scales:{
          x:{ type:'time', time:{unit:days<=7?'hour':(days<=90?'day':'week')},
              ticks:{color:'#6b7280',font:{size:10}}, grid:{color:'#1f2937'} },
          y:{ position:'right', ticks:{color:'#9ca3af',font:{size:10}}, grid:{color:'#1f2937'} },
          y2:{ position:'left', max:()=>Math.max(...vols.map(v=>v.y))*4,
               ticks:{display:false}, grid:{display:false} }
        }
      }
    });
  }catch(e){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#ef4444'; ctx.font='13px system-ui'; ctx.textAlign='center';
    ctx.fillText(`⚠️ ${e.message}`, canvas.width/2, 200);
  }
}

/* ══════════════════════════════════════════════
   台股名稱 → 代號 反查系統
   資料來源：TWSE + TPEX 完整上市/上櫃清單
   快取到 twNameMap，格式： { '台積電': '2330', '鴻海': '2317', ... }
══════════════════════════════════════════════ */
let twNameMap = null;       // 快取：{ 公司簡稱/名稱: 股票代號 }
let twNameMapReady = false;

async function buildTWNameMap(){
  if(twNameMapReady) return twNameMap;
  twNameMap = {};
  try{
    /* TWSE 上市公司 */
    const r1 = await fetch('https://openapi.twse.com.tw/v1/opendata/t187ap03_L',
      { signal: AbortSignal.timeout(10000) });
    if(r1.ok){
      const d = await r1.json();
      d.forEach(item=>{
        const code  = (item['公司代號']||item['股票代號']||'').trim();
        const full  = (item['公司名稱']||'').trim();
        const abbr  = (item['公司簡稱']||'').trim();
        if(!code) return;
        if(full)  twNameMap[full]  = code;
        if(abbr)  twNameMap[abbr]  = code;
        /* 去掉「股份有限公司」「公司」等後綴也存一份 */
        const short = full.replace(/股份有限公司|有限公司|公司$/,'').trim();
        if(short && short!==full) twNameMap[short] = code;
      });
    }
  }catch(e){ console.warn('TWSE 上市名稱表失敗:',e); }

  try{
    /* TPEX 上櫃公司 */
    const r2 = await fetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes',
      { signal: AbortSignal.timeout(10000) });
    if(r2.ok){
      const d = await r2.json();
      d.forEach(item=>{
        const code = (item['SecuritiesCompanyCode']||item['CompanyCode']||'').trim();
        const full = (item['CompanyName']||'').trim();
        const abbr = (item['CompanyAbbreviation']||'').trim();
        if(!code) return;
        if(full) twNameMap[full] = code;
        if(abbr) twNameMap[abbr] = code;
        const short = full.replace(/股份有限公司|有限公司|公司$/,'').trim();
        if(short && short!==full) twNameMap[short] = code;
      });
    }
  }catch(e){ console.warn('TPEX 上櫃名稱表失敗:',e); }

  twNameMapReady = true;
  console.log(`[TW名稱表] 共載入 ${Object.keys(twNameMap).length} 筆`);
  return twNameMap;
}

/* 從 OCR 文字反查台股代號
   策略：
   1. 完全比對（「台積電」「鴻海精密」）
   2. 部分比對（OCR 文字包含名稱，或名稱包含 OCR 文字）
   3. 最短優先，避免誤判
   回傳 { ticker, name } 或 null
*/
function lookupTWNameToTicker(ocrText){
  if(!twNameMap) return null;
  const text = ocrText.trim();
  if(text.length < 2) return null;

  /* 1. 完全比對 */
  if(twNameMap[text]) return { ticker: twNameMap[text], name: text };

  /* 2. 在對照表裡找包含此文字的名稱（例如 OCR 識別到「台積」→找到「台積電」） */
  let bestMatch = null, bestLen = Infinity;
  for(const [name, code] of Object.entries(twNameMap)){
    const matched = name.includes(text) || text.includes(name);
    if(matched && name.length < bestLen){
      bestLen = name.length;
      bestMatch = { ticker: code, name };
    }
  }
  return bestMatch;
}

/* 從整段 OCR 文字掃描所有可能的台股名稱
   切割成 2-8 個字的滑動視窗，逐一查詢
*/
function scanTWNamesFromText(fullText){
  if(!twNameMap) return [];
  const results = [];
  const seen = new Set();

  /* 先以行為單位 */
  const lines = fullText.split(/[\n\r]+/).map(l=>l.trim()).filter(l=>l.length>=2);

  for(const line of lines){
    /* 嘗試 2-8 字的滑動視窗 */
    for(let len=8; len>=2; len--){
      for(let i=0; i<=line.length-len; i++){
        const chunk = line.substring(i, i+len);
        if(twNameMap[chunk] && !seen.has(twNameMap[chunk])){
          seen.add(twNameMap[chunk]);
          results.push({ ticker: twNameMap[chunk], name: chunk });
        }
      }
    }
  }
  return results;
}
function parseCSVLine(line){
  const out=[]; let cur='',inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;} else if(ch===','&&!inQ){out.push(cur.trim());cur='';} else{cur+=ch;}
  }
  out.push(cur.trim()); return out;
}

/* ══════════════════════════════════════════════
   OCR — 多圖（最多8張）
   台股模式：
     ① Tesseract 繁中+英雙語引擎
     ② 先掃數字代號（4-6位）
     ③ 再用台股名稱對照表反查中文股名
   美股模式：
     ① Tesseract 英語引擎
     ② 掃大寫字母代號（2-6位）
══════════════════════════════════════════════ */
window.handleOCR = async event => {
  const files = Array.from(event.target.files||[]).slice(0,8);
  if(!files.length) return;
  const btn   = document.getElementById('ocrBtn');
  btn.disabled = true;
  const isTW  = curMarket === 'TW';
  const total = files.length;
  let allMatched = 0;
  const allNewS  = [];

  try{
    /* 台股：預先載入名稱對照表（背景非同步，不阻塞） */
    if(isTW){
      btn.innerHTML = `<span class="spin"></span> 載入名稱表...`;
      await buildTWNameMap();
    }

    /* 台股用繁中+英雙語；美股用英語 */
    const lang = isTW ? 'chi_tra+eng' : 'eng';
    btn.innerHTML = `<span class="spin"></span> 初始化...`;
    const wk = await Tesseract.createWorker(lang);

    for(let i = 0; i < files.length; i++){
      btn.innerHTML = `<span class="spin"></span> 辨識 ${i+1}/${total}`;
      try{
        const { data:{ text } } = await wk.recognize(files[i]);
        let matched = 0;

        /* ── 台股辨識 ── */
        if(isTW){
          const addedTickers = new Set();

          /* ① 掃數字代號（4-6位，可能附有價格） */
          text.split('\n').forEach(line=>{
            const m = line.match(/\b(\d{4,6}[A-Z]?)\b/);
            if(!m) return;
            const ticker = m[1];
            /* 嘗試取同行的數字作為價格 */
            const priceM = line.replace(ticker,'').match(/([\d,]+\.?\d*)/);
            const price  = priceM ? parseFloat(priceM[1].replace(/,/g,'')) : 0;
            if(addedTickers.has(ticker)) return;
            addedTickers.add(ticker);
            let s = stocks['TW'].find(x=>x.ticker===ticker);
            if(s){
              if(price>0) s.price = price;
              saveToDB(s); matched++;
            }else{
              const ns = mkStock(ticker, ticker, '', 'TW');
              if(price>0) ns.price = price;
              ns.updated = new Date().toLocaleString('zh-TW',{hour12:false});
              stocks['TW'].push(ns); saveToDB(ns); allNewS.push(ns); matched++;
            }
          });

          /* ② 台股名稱反查（滑動視窗掃全文） */
          const nameResults = scanTWNamesFromText(text);
          nameResults.forEach(({ ticker, name })=>{
            if(addedTickers.has(ticker)) return; // 已被代號辨識加入
            addedTickers.add(ticker);
            let s = stocks['TW'].find(x=>x.ticker===ticker);
            if(s){
              /* 已存在：更新名稱（如果原本是代號暫代） */
              if(!s.name || s.name===s.ticker) s.name = name;
              saveToDB(s); matched++;
            }else{
              /* 新增：名稱已知，代號從對照表取得 */
              const ns = mkStock(ticker, name, '', 'TW');
              ns.updated = new Date().toLocaleString('zh-TW',{hour12:false});
              stocks['TW'].push(ns); saveToDB(ns); allNewS.push(ns); matched++;
            }
          });

        /* ── 美股辨識 ── */
        }else{
          text.split('\n').forEach(line=>{
            const mUS = line.match(/\b([A-Z]{2,6})\b/);
            if(!mUS) return;
            const ticker = mUS[1];
            /* 過濾常見英文非股票單字 */
            const skipWords = new Set(['THE','AND','FOR','FROM','THIS','THAT','WITH',
              'HAVE','WILL','YOUR','ARE','NOT','BUT','ALL','CAN','HER','WAS','ONE',
              'OUR','OUT','DAY','GET','HAS','HIM','HIS','HOW','ITS','MAY','NEW',
              'NOW','OLD','SEE','TWO','WHO','BOY','DID','ITS','LET','PUT','SAY',
              'SHE','TOO','USE','USD','NYSE','NASDAQ','ETF','IPO','CEO','CFO',
              'USD','HKD','TWD','JPY','EUR','GBP','AUD']);
            if(skipWords.has(ticker)) return;
            const priceM = line.replace(ticker,'').match(/([\d,]+\.?\d{2})/);
            const price  = priceM ? parseFloat(priceM[1].replace(/,/g,'')) : 0;
            let s = stocks['US'].find(x=>x.ticker===ticker);
            if(s){
              if(price>0) s.price = price;
              saveToDB(s); matched++;
            }else{
              const ns = mkStock(ticker, ticker, '', 'US');
              if(price>0) ns.price = price;
              ns.updated = new Date().toLocaleString('zh-TW',{hour12:false});
              stocks['US'].push(ns); saveToDB(ns); allNewS.push(ns); matched++;
            }
          });
        }

        allMatched += matched;
        render();
        if(matched > 0) toast(`第${i+1}張：識別 ${matched} 筆`);
        else toast(`第${i+1}張：未識別到${isTW?'台股':'美股'}代號`);

      }catch(imgErr){
        console.warn(`第${i+1}張 OCR 失敗:`, imgErr);
        toast(`⚠️ 第${i+1}張辨識失敗，繼續下一張`);
      }
    }/* end for */

    await wk.terminate();
    render();

    if(allMatched > 0){
      toast(`📸 ${total}張圖片共識別 ${allMatched} 筆（含股名反查）`, 3500);
    }else{
      const hint = isTW
        ? '📸 未識別到台股代號或公司名稱\n（支援：數字代號 4-6位 或 公司名稱）'
        : '📸 未識別到美股代號';
      toast(hint, 4000);
    }

    /* 自動 updateStock 補全資料（名稱/分類/報價） */
    if(allNewS.length){
      toast(`⏳ 正在補全 ${allNewS.length} 筆新資料...`, 3000);
      for(const s of allNewS){
        await updateStock(s);
        render();
      }
      toast(`✅ ${allNewS.length} 筆新股票資料已補全`);
    }

  }catch(e){
    console.error('OCR 初始化失敗:', e);
    toast('❌ OCR 初始化失敗，請重試');
  }

  btn.innerText = '📸 OCR';
  btn.disabled  = false;
  event.target.value = '';
};

/* ══════════════════════
   搜尋
══════════════════════ */
document.getElementById('srch').addEventListener('input', e=>{
  const q = e.target.value.toUpperCase().trim();
  render(q ? stocks[curMarket].filter(s=>
    s.ticker.includes(q) ||
    (s.name||'').toUpperCase().includes(q) ||
    (s.category||'').toUpperCase().includes(q)
  ) : null);
});

/* ══════════════════════
   渲染輔助
══════════════════════ */
const BTN_SZ = 'font-size:12px;padding:5px 9px;border-radius:5px;font-weight:700;';
function mkBtn(label,bg,oc,color='white'){
  return `<button onclick="${oc}" style="background:${bg};color:${color};${BTN_SZ}">${label}</button>`;
}
function mkMuted(txt){ return `<span style="font-size:11px;color:#6b7280;">${txt}</span>`; }
function mkSpin(){ return `<span style="font-size:11px;color:#6b7280;display:flex;align-items:center;gap:3px;"><span class="spin"></span>讀取</span>`; }

function newsBtn(s){
  const t=s.ticker;
  if(!s.news||s.news==='')                     return mkBtn('載入','#1d4ed8',`handleNewsClick('${t}')`);
  if(s.news==='loading')                        return mkSpin();
  if(s.news==='loaded'&&s.newsItems?.length>0) return mkBtn(`新聞${s.newsItems.length}`,'#15803d',`showDetail('${t}','news')`);
  if(s.news==='無近期新聞')                     return mkMuted('無新聞');
  return mkBtn('重試','#b45309',`retryNews('${t}')`);
}
function finBtn(s){
  const t=s.ticker;
  if(!s.financials||s.financials==='')         return mkBtn('載入','#1d4ed8',`handleFinClick('${t}')`);
  if(s.financials==='loading')                 return mkSpin();
  if(s.financials==='loaded')                  return mkBtn('財報','#15803d',`showDetail('${t}','financials')`);
  return mkBtn('重試','#b45309',`retryFin('${t}')`);
}

/* ══════════════════════
   主渲染
══════════════════════ */
function render(list){
  const src    = list || stocks[curMarket];
  const isTW   = curMarket==='TW';
  const sorted = [...src].sort((a,b)=>
    (a.category||'未分類').localeCompare(b.category||'未分類','zh-Hant') ||
    a.ticker.localeCompare(b.ticker)
  );

  /* 更新數量 */
  updateTabCounts();

  const container = document.getElementById('dataRows');
  container.innerHTML = '';

  sorted.forEach(s=>{
    const cv       = parseFloat(s.change||0);
    const priceCls = cv>0?'up':(cv<0?'dn':'flat');

    /* 開盤/最高/最低 vs 前日收盤 */
    const pc = Number(s.prevClose||0);
    function ohlcCls(val){ if(!pc||!val)return'flat'; return val>pc?'up':(val<pc?'dn':'flat'); }

    /* 成交量顏色 */
    const pv=Number(s.prevVol||0), curV=Number(s.volume||0);
    let volCls='vol-flat';
    if(pv>0&&curV>0){ volCls=curV>pv?'vol-up':(curV<pv?'vol-dn':'vol-flat'); }

    const catOk      = s.category && s.category.trim()!=='' && s.category!=='未分類';
    const catDisplay = catOk ? s.category : (s.needUpdate&&(!s.category||s.category.trim()==='') ? '取得中...' : '未分類');
    const catColor   = catOk ? 'color:#e2e8f0;' : (s.needUpdate&&(!s.category||s.category.trim()==='') ? 'color:#6b7280;font-style:italic;' : 'color:#f87171;');

    const nm         = (s.name||s.ticker).substring(0,18) + ((s.name||'').length>18?'…':'');
    const nameIsTemp = (s.name||'')===s.ticker;

    /* 台股代號顏色 */
    const tkColor = isTW ? 'color:#f87171;' : 'color:#34d399;';

    let tHtml;
    if((s.updated||'-').startsWith('⚠️')){
      tHtml=`<button onclick="showFailTime('${s.ticker}')" style="background:#78350f;color:#fde68a;font-size:10px;padding:3px 8px;border-radius:4px;">⚠️ 失敗</button>`;
    }else{
      tHtml=`<span style="font-size:10px;color:#6b7280;">${s.updated||'-'}</span>`;
    }

    /* 成交量格式（台股單位：張） */
    const volDisplay = isTW ? fVolTW(s.volume) : fVol(s.volume);

    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div class="col-tk w-tk" style="${tkColor}font-weight:700;font-size:13px;">${s.ticker}</div>
      <div class="w-nm" title="${(s.name||'').replace(/"/g,'&quot;')}"
           style="${nameIsTemp?'color:#fb923c;font-style:italic;':''}">${nm}</div>
      <div class="w-ct" style="${catColor}font-size:12px;">${catDisplay}</div>
      <div class="w-pr ${priceCls}" style="font-weight:700;">${f2(s.price)}</div>
      <div class="w-ch ${priceCls}" style="font-weight:700;">${cv>0?'+':''}${Math.abs(cv).toFixed(2)}%</div>
      <div class="w-oc ${ohlcCls(s.open)}">${f2(s.open)}</div>
      <div class="w-oc ${ohlcCls(s.high)}">${f2(s.high)}</div>
      <div class="w-oc ${ohlcCls(s.low)}">${f2(s.low)}</div>
      <div class="w-vl ${volCls}">${volDisplay}</div>
      <div class="w-tm">${tHtml}</div>
      <div class="w-nw">${newsBtn(s)}</div>
      <div class="w-fn">${finBtn(s)}</div>
      <div class="w-ch2">${mkBtn('線圖','#3f3f46',`showChart('${s.ticker}')`)}</div>
      <div class="w-ac">
        ${mkBtn('更新','#059669',`updateOne('${s.ticker}')` ,'black')}
        ${mkBtn('刪除','#7f1d1d',`deleteStock('${s.ticker}')` ,'#fca5a5')}
      </div>`;
    container.appendChild(row);
  });
}

window.render = render;

})();
</script>
