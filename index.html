<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投資大師 v5（Excel專業版）</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>

<style>
body { background:#000; color:#fff; font-size:13px; }

/* 整體可橫向滑 */
.table-wrap {
  overflow-x:auto;
}

/* 每列 */
.row {
  display:flex;
  border-bottom:1px solid #333;
  min-width:1600px;
}

/* 每格 */
.cell {
  padding:6px;
  min-width:100px;
  white-space:nowrap;
  overflow:hidden;
}

/* 長內容欄位 */
.long-cell {
  min-width:300px;
  max-width:400px;
  overflow-x:auto;
  white-space:nowrap;
  color:#ccc;
}

/* 表頭 */
.header {
  background:#111;
  font-weight:bold;
}
</style>
</head>

<body>

<header class="p-3">
<h1 class="text-xl text-emerald-400">投資大師</h1>

<div class="flex gap-2 mt-2">
<button onclick="updateAllStocks()" class="bg-yellow-500 px-3 py-1 rounded text-sm">🔄 全部更新</button>

<button onclick="imageUpload.click()" class="bg-blue-500 px-3 py-1 rounded text-sm">📸 掃描</button>
<input type="file" id="imageUpload" class="hidden" onchange="handleImageUpload(event)">
</div>

<input id="search" placeholder="搜尋..." class="w-full mt-2 p-2 bg-gray-800 rounded text-sm">
</header>

<div class="table-wrap">

<!-- 表頭 -->
<div class="row header">
<div class="cell">分類</div>
<div class="cell">代號</div>
<div class="cell">名稱</div>
<div class="cell">價格</div>
<div class="cell">漲跌%</div>
<div class="cell long-cell">最新新聞</div>
<div class="cell long-cell">最新財報</div>
<div class="cell long-cell">投資建議</div>
<div class="cell">操作</div>
</div>

<!-- 資料 -->
<div id="list"></div>

</div>

<script>

let stocks = JSON.parse(localStorage.getItem('stocks')) || [
{
ticker:"NVDA",
name:"NVIDIA",
category:"AI",
price:900,
change:1.2,
news:"這是一段測試新聞內容，可以放很多很多字...",
financials:"這是一段財報內容，可以放200字以上...",
advice:"這是一段投資建議內容..."
}
];

// ===== 儲存 =====
function save(){
localStorage.setItem('stocks', JSON.stringify(stocks));
render();
}

// ===== UI =====
function render(data = stocks){

let html = "";

data.forEach((s,i)=>{

html += `
<div class="row">

<div class="cell">${s.category}</div>
<div class="cell font-bold">${s.ticker}</div>
<div class="cell">${s.name}</div>
<div class="cell">${s.price}</div>
<div class="cell">${s.change}%</div>

<div class="cell long-cell">${s.news || "-"}</div>
<div class="cell long-cell">${s.financials || "-"}</div>
<div class="cell long-cell">${s.advice || "-"}</div>

<div class="cell flex gap-1">
<button onclick="updateStock(${i})" class="bg-blue-500 px-2 rounded text-xs">更</button>
<button onclick="deleteStock(${i})" class="bg-red-500 px-2 rounded text-xs">刪</button>
</div>

</div>
`;

});

document.getElementById("list").innerHTML = html;
}

// ===== 刪除 =====
function deleteStock(i){
stocks.splice(i,1);
save();
}

// ===== 更新（不動價格）=====
function updateStock(i){
let s = stocks[i];

s.news = "最新新聞：" + s.ticker + "（可放長內容）";
s.financials = "財報更新（可放200~400字）";
s.advice = "短線觀察 / 中長線策略";

save();
}

// ===== 全部更新 =====
function updateAllStocks(){
stocks.forEach((_,i)=>updateStock(i));
alert("更新完成");
}

// ===== OCR =====
async function handleImageUpload(e){

const file = e.target.files[0];
if(!file) return;

const worker = await Tesseract.createWorker('eng');
const { data:{ text } } = await worker.recognize(file);

text.split('\n').forEach(line=>{
let m = line.match(/([A-Z0-9]{2,6})/);
if(m){
let ticker = m[1];

if(!stocks.find(s=>s.ticker===ticker)){
stocks.unshift({
ticker,
name:"掃描新增",
category:"OCR",
price:0,
change:0,
news:"",
financials:"",
advice:""
});
}
}
});

await worker.terminate();
save();
}

// ===== 搜尋 =====
document.getElementById("search").addEventListener("input", e=>{
let t = e.target.value.toUpperCase();
render(stocks.filter(s=>s.ticker.includes(t)));
});

// ===== 啟動 =====
render();

</script>

</body>
</html>
