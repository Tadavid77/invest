<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投資大師 Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.0.5/dist/tesseract.min.js"></script>

<style>
body { background:#000; color:#fff; font-size:13px; }

/* 橫向滑動 */
.table-wrap { overflow-x:auto; }

/* 列 */
.row {
  display:flex;
  min-width:1700px;
  border-bottom:1px solid #333;
}

/* 格 */
.cell {
  padding:6px;
  min-width:100px;
}

/* 凍結代號欄 */
.sticky {
  position:sticky;
  left:0;
  background:#111;
  z-index:10;
  border-right:2px solid #333;
}

/* 長文字 */
.long {
  min-width:300px;
  max-width:400px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  cursor:pointer;
  color:#aaa;
}

/* 漲跌色 */
.up { color:#ff4d4f; }
.down { color:#00c853; }

/* modal */
.modal {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}
.modal-content {
background:#111;
padding:20px;
max-width:90%;
max-height:80%;
overflow:auto;
}
</style>
</head>

<body>

<header class="p-3">
<h1 class="text-emerald-400 text-xl">投資大師 Pro</h1>

<div class="flex gap-2 mt-2">
<button onclick="updateAll()" class="bg-yellow-500 px-3 py-1 rounded">更新全部</button>
<button onclick="upload.click()" class="bg-blue-500 px-3 py-1 rounded">OCR</button>
<input type="file" id="upload" class="hidden" onchange="ocr(event)">
</div>

<input id="search" class="w-full mt-2 p-2 bg-gray-800" placeholder="搜尋">
</header>

<div class="table-wrap">

<div class="row bg-gray-900">
<div class="cell sticky">代號</div>
<div class="cell">名稱</div>
<div class="cell">分類</div>
<div class="cell">價格</div>
<div class="cell">漲跌%</div>
<div class="cell">新聞</div>
<div class="cell">財報</div>
<div class="cell">建議</div>
<div class="cell">操作</div>
</div>

<div id="list"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal" onclick="this.style.display='none'">
<div class="modal-content" id="modalText"></div>
</div>

<script>

let stocks = JSON.parse(localStorage.getItem('stocks')) || [];

function save(){
localStorage.setItem('stocks',JSON.stringify(stocks));
render();
}

// ===== UI =====
function render(){

let html="";

stocks.forEach((s,i)=>{

let color = s.change>0 ? "up" : "down";

html+=`
<div class="row">

<div class="cell sticky font-bold">${s.ticker}</div>
<div class="cell">${s.name}</div>
<div class="cell">${s.category}</div>

<div class="cell ${color}">${s.price||"-"}</div>
<div class="cell ${color}">${s.change||0}%</div>

<div class="cell long" onclick="show('${s.news||""}',${i},'news')">${s.news||"-"}</div>
<div class="cell long" onclick="show('${s.financials||""}',${i},'fin')">${s.financials||"-"}</div>
<div class="cell long" onclick="show('${s.advice||""}',${i},'adv')">${s.advice||"-"}</div>

<div class="cell">
<button onclick="updateOne(${i})">更</button>
<button onclick="del(${i})">刪</button>
</div>

</div>
`;

});

document.getElementById("list").innerHTML=html;
}

// ===== modal =====
function show(text,i,type){

let history = stocks[i].history?.[type] || [];

document.getElementById("modalText").innerHTML = `
<div>${text}</div>
<hr>
<h3>歷史紀錄</h3>
${history.map(h=>`<div>${h}</div>`).join("")}
`;

document.getElementById("modal").style.display="flex";
}

// ===== OCR =====
async function ocr(e){

const file = e.target.files[0];
const worker = await Tesseract.createWorker('eng');
const { data:{text} } = await worker.recognize(file);

text.split("\n").forEach(line=>{

let m = line.match(/[A-Z]{2,6}/);
if(!m) return;

let ticker = m[0];

// 白名單邏輯
let exist = stocks.find(s=>s.ticker===ticker);

if(!exist){
if(confirm(`新增 ${ticker}?`)){
stocks.unshift({
ticker,
name:"新標的",
category:"OCR",
history:{news:[],fin:[],adv:[]}
});
}
}
});

await worker.terminate();
save();
}

// ===== 更新 =====
async function updateOne(i){

let s = stocks[i];

// 假資料（你之後會接API）
s.price = (Math.random()*1000).toFixed(2);
s.change = (Math.random()*10-5).toFixed(2);

let news = "最新新聞 "+Date.now();
let fin = "財報 "+Date.now();
let adv = "投資建議 "+Date.now();

// 歷史
s.history = s.history || {news:[],fin:[],adv:[]};

["news","fin","adv"].forEach(k=>{
s.history[k].unshift(s[k]);
s.history[k]=s.history[k].slice(0,7);
});

s.news = news;
s.financials = fin;
s.advice = adv;

save();
}

// ===== 全部 =====
async function updateAll(){
for(let i=0;i<stocks.length;i++){
await updateOne(i);
}
}

// ===== 刪除 =====
function del(i){
stocks.splice(i,1);
save();
}

// ===== 搜尋 =====
document.getElementById("search").addEventListener("input",e=>{
let t=e.target.value.toUpperCase();
render(stocks.filter(s=>s.ticker.includes(t)));
});

render();

</script>
</body>
</html>
