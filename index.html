<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資大師 v2</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#000; color:#fff; }
.card { background:#1c1c1e; padding:15px; border-radius:15px; margin-bottom:10px;}
</style>
</head>

<body>

<header class="p-4">
<h1 class="text-2xl text-emerald-400">投資大師</h1>

<button onclick="updateAllStocks()" class="bg-yellow-500 px-4 py-2 rounded mt-2">
🔄 全面更新
</button>

<input id="search" placeholder="搜尋..." class="w-full mt-2 p-2 bg-gray-800 rounded">
</header>

<main id="list" class="p-4"></main>

<script>

// ====== 測試用資料 ======
let stocks = JSON.parse(localStorage.getItem('stocks')) || [
{ticker:"NVDA", name:"NVIDIA", category:"AI", price:900, change:1.2, news:"-", advice:"AI龍頭"}
];

// ====== 儲存 ======
function save(){
localStorage.setItem('stocks', JSON.stringify(stocks));
render();
}

// ====== 畫面 ======
function render(data = stocks){
let html = "";

data.forEach((s,i)=>{
html += `
<div class="card">

<div class="flex justify-between">
<div>
<div class="text-green-400 text-xs">${s.category}</div>
<div class="text-xl">${s.ticker}</div>
<div class="text-gray-400 text-sm">${s.name}</div>
</div>

<div class="text-right">
<div>${s.price}</div>
<div>${s.change}%</div>
</div>
</div>

<div class="text-xs mt-2">📰 ${s.news}</div>
<div class="text-xs">🤖 ${s.advice}</div>

<div class="flex gap-2 mt-2">
<button onclick="updateStock(${i})" class="bg-blue-500 px-2 py-1 rounded text-xs">更新</button>
<button onclick="deleteStock(${i})" class="bg-red-500 px-2 py-1 rounded text-xs">刪除</button>
</div>

</div>
`;
});

document.getElementById("list").innerHTML = html;
}

// ====== 刪除 ======
function deleteStock(i){
stocks.splice(i,1);
save();
}

// ====== 單筆更新（先用假資料） ======
async function updateStock(i){

// 模擬API（避免你現在壞掉）
stocks[i].price = (Math.random()*1000).toFixed(2);
stocks[i].change = (Math.random()*5).toFixed(2);
stocks[i].news = "最新新聞測試";
stocks[i].advice = "短線觀察";

save();
}

// ====== 全部更新 ======
async function updateAllStocks(){
for(let i=0;i<stocks.length;i++){
await updateStock(i);
}
alert("更新完成");
}

// ====== 搜尋 ======
document.getElementById("search").addEventListener("input", e=>{
let t = e.target.value.toUpperCase();
render(stocks.filter(s=>s.ticker.includes(t)));
});

// ====== 啟動 ======
render();

</script>

</body>
</html>
