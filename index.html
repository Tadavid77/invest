<script>
// 🔑 API KEYS（請填入）
const STOCK_API_KEY = "你的AlphaVantageKey";
const NEWS_API_KEY = "你的NewsAPIKey";
const OPENAI_API_KEY = "你的OpenAIKey";

// 更新全部
async function updateAllStocks(){
  for(let i=0;i<stocks.length;i++){
    await updateStock(i);
  }
  alert("全部更新完成");
}

// 更新單一股票
async function updateStock(i){
  let s = stocks[i];

  // 📈 股價
  try{
    let res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${s.ticker}&apikey=${STOCK_API_KEY}`);
    let data = await res.json();
    let q = data["Global Quote"];
    if(q){
      s.price = parseFloat(q["05. price"]);
      s.change = parseFloat(q["10. change percent"]);
    }
  }catch(e){}

  // 📰 新聞
  try{
    let newsRes = await fetch(`https://newsapi.org/v2/everything?q=${s.ticker}&apiKey=${NEWS_API_KEY}`);
    let newsData = await newsRes.json();
    s.news = newsData.articles?.[0]?.title || "無新聞";
  }catch(e){}

  // 🤖 AI 建議
  try{
    let aiRes = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + OPENAI_API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"user",
            content:`請分析股票 ${s.ticker}，給我50字內投資建議`
          }
        ]
      })
    });

    let aiData = await aiRes.json();
    s.advice = aiData.choices?.[0]?.message?.content || "無建議";

  }catch(e){}

  save();
}

// UI 修改（render補強）
function render(data = stocks){
let html = "";
data.forEach((s,i)=>{
html += `
<div class="card">
<div class="flex justify-between items-center">

<div>
<div class="text-green-400 text-xs">${s.category}</div>
<div class="text-xl">${s.ticker}</div>
<div class="text-gray-400 text-sm">${s.name}</div>
</div>

<div class="text-right">
<div>${s.price || "-"}</div>
<div>${s.change || "-"}%</div>
</div>

</div>

<div class="text-xs mt-2">📰 ${s.news || "尚未更新"}</div>
<div class="text-xs mt-1">🤖 ${s.advice || "尚未分析"}</div>

<div class="flex gap-2 mt-2">
<button onclick="updateStock(${i})" class="bg-blue-500 px-2 py-1 rounded text-xs">🔄 更新</button>
<button onclick="deleteStock(${i})" class="bg-red-500 px-2 py-1 rounded text-xs">刪除</button>
</div>

</div>
`;
});
document.getElementById("list").innerHTML = html;
}

// 啟動自動更新
window.onload = function(){
  render();
  updateAllStocks();
}
</script>
